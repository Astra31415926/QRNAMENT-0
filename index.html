<!DOCTYPE html>
<html lang="uk">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>QRnament v3.1 // Spectral 7x7 Mandala</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdn.jsdelivr.net/npm/qrcode-generator@1.4.4/qrcode.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/jsqr@1.4.0/dist/jsQR.min.js"></script>
    <style>
        body { background: #000; color: #fff; font-family: 'Inter', system-ui, sans-serif; overflow-x: hidden; }
        .c { color: #00FFFF; } .m { color: #FF00FF; } .y { color: #FFFF00; } 
        .k { color: #FF004D; } .a { color: #00FF41; } .n { color: #0088FF; }
        #canvas { width: 100%; height: 100%; object-fit: contain; image-rendering: pixelated; }
        #video { position: absolute; inset: 0; width: 100%; height: 100%; object-fit: cover; background: #000; transform: scaleX(-1); display: none; }
        .scan-line { position: absolute; left: 0; right: 0; height: 4px; background: #00ff41; box-shadow: 0 0 20px #00ff41; top: 0; z-index: 20; pointer-events: none; display: none; }
        @keyframes pulse { 0% { opacity: 0.6; } 50% { opacity: 1; } 100% { opacity: 0.6; } }
        .flash-overlay { position: absolute; inset: 0; background: white; opacity: 0; pointer-events: none; z-index: 30; transition: opacity 0.1s; }
        .menu-overlay { position: fixed; inset: 0; background: rgba(0,0,0,0.98); z-index: 100; transform: translateX(100%); transition: transform 0.4s; display: flex; flex-direction: column; padding: 2rem; overflow-y: auto; }
        .menu-overlay.open { transform: translateX(0); }
        .neon-btn-green { background: rgba(0, 255, 65, 0.05); border: 1px solid #00ff41; box-shadow: 0 0 10px rgba(0, 255, 65, 0.2); text-shadow: 0 0 5px #00ff41; }
        .neon-text-glow { border: 1px solid #00ff41; }
    </style>
</head>
<body class="flex flex-col min-h-screen p-4 max-w-md mx-auto">

    <div id="menu-overlay" class="menu-overlay">
        <div class="flex justify-between items-center mb-8">
            <div class="flex gap-2 bg-zinc-800 p-1 rounded-lg">
                <button onclick="App.setLang('ua')" id="btn-lang-ua" class="text-xs font-bold px-3 py-1 rounded">UA</button>
                <button onclick="App.setLang('en')" id="btn-lang-en" class="text-xs font-bold px-3 py-1 rounded">EN</button>
            </div>
            <button onclick="App.toggleMenu()" class="text-3xl">&times;</button>
        </div>
        <div class="space-y-6 text-sm" id="menu-content">
            <h2 class="text-xl font-black">QRnament v3.1</h2>
            <p data-i18n="m_usage_text">Створюйте спектральні 2D-коди.</p>
        </div>
    </div>

    <header class="flex justify-between items-center mb-4">
        <h1 class="text-2xl font-black uppercase"><span class="text-white">QR</span><span class="c">n</span><span class="m">a</span><span class="y">m</span><span class="k">e</span><span class="a">n</span><span class="n">t</span></h1>
        <button onclick="App.toggleMenu()" class="p-2 border border-white/10 rounded-lg">MENU</button>
    </header>

    <div class="mb-4 relative">
        <textarea id="main-input" class="w-full p-4 bg-zinc-900 rounded-2xl border-l-4 border-green-500 outline-none h-16 text-sm text-white" placeholder="Type to generate..."></textarea>
    </div>

    <div class="relative aspect-square w-full bg-zinc-950 rounded-3xl overflow-hidden mb-4">
        <canvas id="canvas" width="1024" height="1024"></canvas>
        <video id="video" playsinline></video>
        <div id="scan-line" class="scan-line"></div>
        <div id="flash-layer" class="flash-overlay"></div>
    </div>

    <div class="flex flex-col gap-3">
        <button onclick="App.save()" class="w-full py-4 bg-black text-white font-black rounded-2xl text-xs uppercase neon-btn-green">Save PNG</button>
        <div class="grid grid-cols-2 gap-3">
            <button onclick="App.startCamera()" class="py-4 bg-black text-white font-bold rounded-2xl border border-green-500 text-xs uppercase neon-btn-green">Cam Scan</button>
            <button onclick="document.getElementById('file-input').click()" class="py-4 bg-black text-white font-bold rounded-2xl border border-green-500 text-xs uppercase neon-btn-green">File Scan</button>
        </div>
        <input type="file" id="file-input" accept="image/*" class="hidden">
    </div>

    <p id="status" class="text-center text-[10px] text-green-500 uppercase font-bold mt-4">Ready</p>

    <script>
        const SPRITE_LIB_7x7 = [[73,42,28,127,28,42,73], [127,65,93,85,93,65,127], [85,62,99,42,99,62,85], [42,119,34,73,34,119,42], [28,42,73,119,73,42,28], [0,62,34,42,46,32,63], [15,1,29,5,52,16,64], [64,96,112,120,112,96,64], [76,102,51,25,51,102,76], [119,69,117,0,87,81,119], [119,85,119,0,119,85,119], [119,65,93,20,93,65,119], [62,73,93,127,93,73,62], [42,107,8,119,8,107,42], [8,42,8,119,8,42,8], [28,8,65,99,65,8,28], [54,99,73,20,73,99,54], [63,31,15,7,3,1,0], [127,63,31,15,7,3,1], [127,31,31,7,7,1,1], [119,17,93,68,119,17,89], [119,21,87,80,127,17,89], [119,85,127,20,127,85,119], [87,80,87,0,117,5,117], [95,80,87,65,117,5,125], [30,80,87,65,117,5,60], [91,80,11,93,104,5,109], [42,99,8,93,8,99,42], [99,99,0,0,0,99,99], [99,99,99,99,99,99,99], [119,93,99,34,99,93,119], [54,85,99,8,99,85,54], [91,73,109,36,54,18,91], [127,8,107,34,107,8,127], [42,34,42,8,42,34,42], [56,43,9,127,72,106,14], [60,72,81,99,69,9,30], [12,56,33,107,66,14,24], [32,126,34,34,34,63,2], [100,94,51,42,102,61,19], [6,92,118,34,55,29,48], [28,62,119,99,119,62,28], [62,99,73,93,73,99,62], [126,67,89,85,77,97,63], [54,85,107,28,107,85,54], [127,119,99,73,99,119,127], [12,22,51,113,14,76,104], [107,73,8,127,8,73,107], [0,62,34,42,58,2,126], [85,21,117,5,125,1,127], [52,102,71,85,71,102,52], [8,8,42,34,54,20,93], [119,99,107,8,107,99,119], [62,34,107,8,107,34,62], [73,62,34,107,34,62,73], [123,123,96,107,3,111,111], [91,27,96,107,3,108,109], [0,63,32,62,2,126,0], [64,95,81,93,69,125,1], [51,51,102,102,76,76,25]];

        const App = {
            state: { lang: 'ua', frozen: false, isScanning: false },
            els: {},
            init() {
                this.els = {
                    canvas: document.getElementById('canvas'), ctx: document.getElementById('canvas').getContext('2d'),
                    video: document.getElementById('video'), input: document.getElementById('main-input'),
                    status: document.getElementById('status'), scanLine: document.getElementById('scan-line'),
                    flash: document.getElementById('flash-layer'), menu: document.getElementById('menu-overlay'),
                    fileInput: document.getElementById('file-input')
                };
                this.els.input.addEventListener('input', () => this.generate());
                this.els.fileInput.addEventListener('change', (e) => this.handleFile(e));
                this.setLang('ua');
                this.clearCanvas();
            },
            toggleMenu() { this.els.menu.classList.toggle('open'); },
            generate() {
                const text = this.els.input.value;
                if (!text) { this.clearCanvas(); return; }
                try {
                    const qr = qrcode(0, 'M');
                    qr.addData(unescape(encodeURIComponent(text)));
                    qr.make();
                    const moduleCount = qr.getModuleCount();
                    const quietZone = 4;
                    const totalModules = moduleCount + quietZone * 2;
                    const modSize = 1024 / totalModules;
                    const ctx = this.els.ctx;
                    
                    ctx.globalCompositeOperation = "source-over";
                    ctx.fillStyle = "#000"; ctx.fillRect(0, 0, 1024, 1024);
                    
                    ctx.fillStyle = "#FF0000";
                    for (let r = 0; r < totalModules; r += 2) 
                        for (let c = 0; c < totalModules; c += 2) 
                            if (Math.random() > 0.5) ctx.fillRect(c * modSize, r * modSize, modSize * 2, modSize * 2);

                    ctx.globalCompositeOperation = "difference";
                    const grid = this.build7x7Grid(totalModules);
                    ctx.fillStyle = "#00FF00";
                    for(let r=0; r<totalModules; r++) 
                        for(let c=0; c<totalModules; c++) 
                            if(grid[r][c]) ctx.fillRect(c * modSize, r * modSize, modSize + 0.5, modSize + 0.5);

                    ctx.globalCompositeOperation = "screen";
                    ctx.fillStyle = "#0000FF";
                    for (let r = 0; r < moduleCount; r++) 
                        for (let c = 0; c < moduleCount; c++) 
                            if (qr.isDark(r, c)) ctx.fillRect((c + quietZone) * modSize, (r + quietZone) * modSize, modSize, modSize);
                    
                    this.updateStatus("Spectral Logic Active");
                } catch (e) { this.updateStatus("Error"); }
            },
            build7x7Grid(size) {
                const grid = Array(size).fill(0).map(() => Array(size).fill(0));
                const center = Math.floor(size / 2);
                const octantMap = new Map();
                for (let i = 0; i < 10; i++) {
                    const pattern = SPRITE_LIB_7x7[Math.floor(Math.random() * SPRITE_LIB_7x7.length)];
                    for (let py = 0; py < 7; py++) 
                        for (let px = 0; px < 7; px++) 
                            if ((pattern[py] >> (6 - px)) & 1) octantMap.set(`${px + i},${py + i}`, true);
                }
                octantMap.forEach((val, key) => {
                    const [x, y] = key.split(',').map(Number);
                    const pts = [[x,y],[y,x],[-x,y],[-y,x],[x,-y],[y,-x],[-x,-y],[-y,-x]];
                    pts.forEach(([px, py]) => {
                        const ax = center + px, ay = center + py;
                        if (ax >= 0 && ax < size && ay >= 0 && ay < size) grid[ay][ax] = 1;
                    });
                });
                return grid;
            },
            startCamera() {
                this.state.isScanning = true;
                navigator.mediaDevices.getUserMedia({ video: { facingMode: "environment" } })
                    .then(stream => { this.els.video.srcObject = stream; this.els.video.style.display = 'block'; this.els.video.play(); this.scanLoop(); });
            },
            scanLoop() {
                if (!this.state.isScanning) return;
                const v = this.els.video;
                if (v.readyState === v.HAVE_ENOUGH_DATA) {
                    const canvas = document.createElement('canvas'); canvas.width = 1024; canvas.height = 1024;
                    const ctx = canvas.getContext('2d'); ctx.drawImage(v, 0, 0, 1024, 1024);
                    const imgData = ctx.getImageData(0, 0, 1024, 1024);
                    const code = jsQR(imgData.data, 1024, 1024);
                    if (code) { 
                        this.els.input.value = code.data; 
                        this.state.isScanning = false; 
                        v.srcObject.getTracks().forEach(t => t.stop()); 
                        v.style.display = 'none'; 
                        this.generate(); 
                        return; 
                    }
                }
                requestAnimationFrame(() => this.scanLoop());
            },
            handleFile(e) {
                const reader = new FileReader();
                reader.onload = (evt) => {
                    const img = new Image();
                    img.onload = () => {
                        this.els.ctx.drawImage(img, 0, 0, 1024, 1024);
                        const data = this.els.ctx.getImageData(0, 0, 1024, 1024);
                        const code = jsQR(data.data, 1024, 1024);
                        if(code) { this.els.input.value = code.data; this.generate(); }
                    };
                    img.src = evt.target.result;
                };
                reader.readAsDataURL(e.target.files[0]);
            },
            clearCanvas() { this.els.ctx.fillStyle = "#000"; this.els.ctx.fillRect(0,0,1024,1024); },
            updateStatus(msg) { this.els.status.innerText = msg; },
            setLang(lang) { this.state.lang = lang; },
            save() { const link = document.createElement('a'); link.download = 'qr.png'; link.href = this.els.canvas.toDataURL(); link.click(); }
        };

        const AudioEngine = { init() {} }; // Placeholder
        document.addEventListener('DOMContentLoaded', () => App.init());
    </script>
</body>
</html>
