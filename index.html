<!DOCTYPE html>
<html lang="uk">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
<title>taina · студія орнаментальних кодів</title>
<script src="https://cdn.jsdelivr.net/npm/qrcode-generator@1.4.4/qrcode.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/jsqr@1.4.0/dist/jsQR.min.js"></script>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@400;600;700&family=Inter:wght@400;500;600&display=swap" rel="stylesheet">
<style>
:root{
  --ink:#0d0a08;--panel:#15100b;--panel2:#1d1610;
  --gold:#c9a876;--gold-hot:#e8c890;--gold-dim:#8f7451;
  --parchment:#ede3d0;--muted:#94836a;--line:rgba(201,168,118,.22);
  --ok:#58d668;--bad:#e5705a;
  --ch-r:#ff3b5c;--ch-g:#35d96a;--ch-b:#4b8dff;
  --mono:'JetBrains Mono',monospace;--sans:'Inter',system-ui,sans-serif;
}
*{margin:0;padding:0;box-sizing:border-box}
html,body{height:100%}
body{background:var(--ink);color:var(--parchment);font-family:var(--sans);line-height:1.5;
  background-image:radial-gradient(ellipse 80% 50% at 50% -10%,rgba(201,168,118,.07),transparent);
  display:flex;flex-direction:column;min-height:100vh;min-height:100dvh}
a{color:var(--gold);text-decoration:none}a:hover{color:var(--gold-hot)}
button{font-family:inherit}
button:focus-visible,select:focus-visible,input:focus-visible{outline:2px solid var(--gold-hot);outline-offset:2px}
.hide{display:none!important}

/* ── шапка ── */
header{border-bottom:1px solid var(--line);flex:0 0 auto;background:rgba(13,10,8,.9);backdrop-filter:blur(10px);position:sticky;top:0;z-index:60}
.nav{display:flex;align-items:center;gap:16px;height:56px;max-width:1560px;margin:0 auto;padding:0 20px}
.mark{font-family:var(--mono);font-weight:700;font-size:19px;letter-spacing:.07em;color:var(--parchment);
  display:flex;align-items:center;gap:8px;cursor:pointer;background:none;border:0;padding:4px 6px;border-radius:8px;transition:.15s}
.mark::after{content:'';width:7px;height:7px;background:var(--gold)}
.mark:hover{color:var(--gold-hot)}
.tabs{display:flex;gap:2px;border:1px solid var(--line);border-radius:10px;overflow:hidden;margin-left:8px}
.tabs button{background:transparent;border:0;border-right:1px solid var(--line);color:var(--muted);
  font-family:var(--mono);font-size:12.5px;font-weight:600;padding:9px 15px;cursor:pointer;transition:.15s;white-space:nowrap}
.tabs button:last-child{border-right:0}
.tabs button.on{background:rgba(201,168,118,.16);color:var(--gold-hot)}
.tabs button:hover:not(.on){color:var(--gold-hot)}
.navright{margin-left:auto;display:flex;align-items:center;gap:10px}
.chip{font-family:var(--mono);font-size:11px;letter-spacing:.14em;color:var(--gold);border:1px solid var(--line);
  border-radius:7px;padding:5px 10px;background:transparent;cursor:pointer;transition:.15s}
.chip:hover{color:var(--gold-hot);border-color:var(--gold-dim)}

/* ── три колонки ── */
.app{flex:1 1 auto;display:grid;grid-template-columns:240px minmax(0,1fr) 244px;max-width:1560px;width:100%;margin:0 auto}
.side{padding:20px 18px;display:flex;flex-direction:column;gap:16px;overflow-y:auto}
.side.left{border-right:1px solid var(--line)}
.side.right{border-left:1px solid var(--line)}
.center{display:flex;flex-direction:column;align-items:center;padding:20px 24px 30px;gap:14px;min-width:0}

.sec-t{font-family:var(--mono);font-size:10.5px;letter-spacing:.2em;color:var(--gold-dim);
  text-transform:uppercase;display:flex;align-items:center;gap:8px}
.sec-t::before{content:'';width:5px;height:5px;background:var(--gold);flex:0 0 auto}
.grp{display:flex;flex-direction:column;gap:8px}
.desc{font-size:12px;color:var(--muted);line-height:1.55}
.desc b{color:var(--parchment);font-weight:600}

/* ── поля ── */
.inp{width:100%;background:var(--panel);border:1px solid var(--line);border-radius:11px;color:var(--parchment);
  font-family:var(--mono);font-size:16px;padding:12px 15px;outline:none;letter-spacing:.03em}
.inp:focus{border-color:var(--gold);box-shadow:0 0 20px rgba(201,168,118,.12)}
.inp::placeholder{color:var(--gold-dim)}
.inp.big{font-size:clamp(16px,2vw,21px);text-align:center;padding:14px 18px}
.chrow{display:flex;align-items:center;gap:9px;margin-bottom:8px}
.chdot{width:10px;height:10px;border-radius:3px;flex:0 0 auto}
.keybtn{width:40px;height:40px;flex:0 0 auto;border-radius:999px;border:1.5px solid var(--line);background:rgba(255,255,255,.04);
  color:rgba(237,227,208,.5);display:flex;align-items:center;justify-content:center;cursor:pointer;transition:.2s}
.keybtn svg{width:17px;height:17px}
.keybtn:hover{color:var(--gold-hot);border-color:var(--gold-dim)}
.keybtn:disabled{opacity:.28;pointer-events:none}
.keybtn.active{color:var(--gold);border-color:var(--gold);background:rgba(201,168,118,.14);animation:kp 1.4s ease-in-out infinite}
.keybtn.locked{color:#15100b;background:var(--gold);border-color:var(--gold)}
@keyframes kp{0%,100%{box-shadow:0 0 6px rgba(201,168,118,.4)}50%{box-shadow:0 0 16px rgba(201,168,118,.7)}}
.masked{-webkit-text-security:disc;letter-spacing:.15em}
.txtwrap{width:100%;max-width:660px}
.rt{font-family:var(--mono);font-size:12px;min-height:17px;text-align:center;margin-top:7px}
.rt .g{color:var(--ok);font-weight:600}.rt .r{color:var(--bad);font-weight:600}

/* ── ФІКСОВАНИЙ ХОЛСТ ── */
.stage{width:100%;max-width:min(46vh,440px);aspect-ratio:1/1;position:relative;
  background:#0a0806;border:1px solid var(--line);border-radius:14px;overflow:hidden;
  display:flex;align-items:center;justify-content:center;flex:0 0 auto;
  box-shadow:0 14px 44px rgba(0,0,0,.45)}
.stage canvas{width:100%;height:100%;object-fit:contain;image-rendering:pixelated;display:block}
.stage video{position:absolute;inset:0;width:100%;height:100%;object-fit:cover}
.corner{position:absolute;width:16px;height:16px;border-color:var(--gold);pointer-events:none;z-index:5}
.c-tl{top:8px;left:8px;border-top:2px solid;border-left:2px solid}
.c-tr{top:8px;right:8px;border-top:2px solid;border-right:2px solid}
.c-bl{bottom:8px;left:8px;border-bottom:2px solid;border-left:2px solid}
.c-br{bottom:8px;right:8px;border-bottom:2px solid;border-right:2px solid}
.laser{position:absolute;left:0;width:100%;height:3px;background:var(--gold);box-shadow:0 0 12px var(--gold);
  opacity:.85;z-index:6;animation:sc 2.4s ease-in-out infinite}
@keyframes sc{0%{top:2%}50%{top:97%}100%{top:2%}}
.overlay{position:absolute;inset:0;background:#141009;display:flex;flex-direction:column;
  align-items:center;justify-content:center;gap:12px;z-index:8;padding:20px;text-align:center}

/* ── ГОЛОВНА КНОПКА ── */
.action{width:100%;max-width:440px;position:relative}
.mainbtn{width:100%;font-family:var(--mono);font-size:15px;font-weight:700;letter-spacing:.06em;
  padding:17px 20px;border-radius:13px;cursor:pointer;transition:.18s;border:1px solid rgba(201,168,118,.6);
  background:linear-gradient(160deg,rgba(201,168,118,.3),rgba(201,168,118,.12));color:var(--gold-hot);
  display:flex;align-items:center;justify-content:center;gap:10px;text-transform:uppercase}
.mainbtn:hover{border-color:var(--gold-hot);box-shadow:0 0 30px rgba(201,168,118,.3);
  background:linear-gradient(160deg,rgba(201,168,118,.4),rgba(201,168,118,.18))}
.mainbtn svg{width:19px;height:19px;flex:0 0 auto}
.menu{position:absolute;left:0;right:0;bottom:calc(100% + 9px);background:var(--panel);
  border:1px solid rgba(201,168,118,.4);border-radius:13px;padding:13px;z-index:40;
  box-shadow:0 -12px 40px rgba(0,0,0,.6);display:flex;flex-direction:column;gap:9px}
.menu-t{font-family:var(--mono);font-size:10px;letter-spacing:.18em;color:var(--gold-dim);text-transform:uppercase}
.menu .row{display:flex;gap:8px}
.menu .row button{flex:1}
.b{font-family:var(--mono);font-size:12.5px;font-weight:600;padding:11px 12px;border-radius:9px;
  border:1px solid var(--line);cursor:pointer;background:transparent;color:var(--muted);transition:.15s}
.b:hover{color:var(--gold-hot);border-color:var(--gold-dim)}
.b.on{background:rgba(201,168,118,.16);color:var(--gold-hot);border-color:rgba(201,168,118,.4)}
.b.wide{width:100%}
.b.gold{background:linear-gradient(160deg,rgba(201,168,118,.22),rgba(201,168,118,.08));
  border-color:rgba(201,168,118,.5);color:var(--gold-hot)}

/* ── сегменти / селекти ── */
.seg{display:flex;border:1px solid var(--line);border-radius:9px;overflow:hidden}
.seg.col{flex-direction:column}
.seg button{flex:1;background:transparent;border:0;color:var(--muted);font-family:var(--mono);
  font-size:12px;font-weight:600;padding:10px 6px;cursor:pointer;transition:.15s;text-align:left}
.seg:not(.col) button{border-right:1px solid var(--line);text-align:center}
.seg.col button{border-bottom:1px solid var(--line)}
.seg button:last-child{border-right:0;border-bottom:0}
.seg button.on{background:rgba(201,168,118,.16);color:var(--gold-hot)}
.seg button:hover:not(.on){color:var(--gold-hot)}
.seg .lbl{font-size:14px;font-weight:700}
.seg .sub{display:block;font-size:9.5px;font-weight:400;color:var(--gold-dim);letter-spacing:.05em;margin-top:2px}
.seg button.on .sub{color:var(--gold)}
select{width:100%;background:var(--panel2);border:1px solid var(--line);border-radius:8px;color:var(--parchment);
  font-family:var(--mono);font-size:12.5px;padding:9px 11px;outline:none}
select:focus{border-color:var(--gold)}
select:disabled{opacity:.32}
.emoji{display:flex;flex-wrap:wrap;gap:5px}
.emoji button{padding:6px 9px;font-size:15px;line-height:1;min-width:34px;border:1px solid var(--line);
  border-radius:7px;background:transparent;cursor:pointer;color:var(--parchment)}
.emoji button:hover{border-color:var(--gold);background:rgba(201,168,118,.1)}
.stat{font-family:var(--mono);font-size:11px;color:var(--muted);display:flex;flex-direction:column;
  gap:5px;border-top:1px solid var(--line);padding-top:12px}
.stat b{color:var(--gold);font-weight:600}
.stat .big{font-size:15px;color:var(--gold-hot)}
.warn{color:#e5a053;display:none}
.flash{position:fixed;inset:0;background:#fff;opacity:0;pointer-events:none;z-index:200;transition:opacity .3s}

@media(max-width:1020px){
  .app{grid-template-columns:1fr;max-width:600px}
  .side{border:0!important;border-top:1px solid var(--line)!important;order:3}
  .side.left{order:2}
  .center{order:1;padding-top:16px}
  .stage{max-width:min(70vw,380px)}
  .nav{flex-wrap:wrap;height:auto;padding:10px 16px;gap:10px}
  .tabs button{padding:8px 11px;font-size:11.5px}
}
</style>
</head>
<body>

<header><div class="nav">
  <button class="mark" id="home-btn" title="На початок">taina</button>
  <div class="tabs" id="tabs">
    <button data-gen="byte" class="on">Байткод</button>
    <button data-gen="seal">Печатка</button>
    <button data-gen="spec">Spectrum</button>
  </div>
  <div class="navright">
    <button class="chip" id="scan-chip">⌖ Сканувати</button>
  </div>
</div></header>

<div class="app">

  <!-- ЛІВОРУЧ -->
  <aside class="side left">
    <!-- байткод -->
    <div id="p-byte" class="grp">
      <div class="grp">
        <div class="sec-t">Шари</div>
        <div class="seg" id="layers">
          <button data-l="1" class="on">1 шар</button>
          <button data-l="3">3 шари · RGB</button>
        </div>
      </div>
      <div class="grp">
        <div class="sec-t">Симетрія</div>
        <div class="seg col" id="sym">
          <button data-m="oct" class="on"><span class="lbl">×8</span><span class="sub">октант · орнамент</span></button>
          <button data-m="quad"><span class="lbl">×4</span><span class="sub">дзеркала</span></button>
          <button data-m="half"><span class="lbl">×2</span><span class="sub">рядок</span></button>
        </div>
      </div>
    </div>
    <!-- печатка -->
    <div id="p-seal" class="grp hide">
      <div class="sec-t">Печатка</div>
      <button class="b wide" id="seal-refresh">↻ Новий візерунок</button>
    </div>
    <!-- spectrum -->
    <div id="p-spec" class="grp hide">
      <div class="sec-t">Spectrum</div>
      <p class="desc">Три QR-коди в трьох каналах RGB. Кожен канал можна замкнути власним паролем — ключ ліворуч від поля.</p>
    </div>

    <div class="grp">
      <div class="sec-t">Принцип</div>
      <p class="desc" id="principle"></p>
    </div>

    <div class="stat">
      <span>Байтів: <b class="big" id="s-by">0</b></span>
      <span>Поле: <b id="s-fld">—</b></span>
      <span id="s-cap-row">Ємність шару: <b id="s-cap">0</b> біт</span>
      <span class="warn" id="s-warn">Замало місця — скороти текст</span>
    </div>
  </aside>

  <!-- ЦЕНТР -->
  <main class="center">
    <div class="txtwrap">
      <!-- байткод: 1 шар -->
      <div id="in-single"><input type="text" id="t-single" class="inp big" maxlength="50" value="ТАЇНА" placeholder="Напиши щось…" autocomplete="off" spellcheck="false"></div>
      <!-- байткод: 3 шари -->
      <div id="in-triple" class="hide">
        <div class="chrow"><span class="chdot" style="background:var(--ch-r)"></span><input type="text" id="t-r" class="inp" maxlength="50" value="ТАЇНА" placeholder="червоний шар…" autocomplete="off" spellcheck="false"></div>
        <div class="chrow"><span class="chdot" style="background:var(--ch-g)"></span><input type="text" id="t-g" class="inp" maxlength="50" placeholder="зелений шар…" autocomplete="off" spellcheck="false"></div>
        <div class="chrow"><span class="chdot" style="background:var(--ch-b)"></span><input type="text" id="t-b" class="inp" maxlength="50" placeholder="синій шар…" autocomplete="off" spellcheck="false"></div>
        <div style="display:flex;justify-content:center;margin-top:2px"><button class="b" id="split-btn">⑂ Розділити верхній текст на 3</button></div>
      </div>
      <!-- печатка -->
      <div id="in-seal" class="hide">
        <input type="text" id="t-seal" class="inp big" maxlength="300" placeholder="Текст таємниці…" autocomplete="off" spellcheck="false">
        <div class="chrow" style="margin-top:9px">
          <button class="keybtn" id="seal-key" disabled aria-label="ключ"></button>
          <input type="text" id="p-seal-pass" class="inp" maxlength="12" placeholder="ключ (необов'язково)" autocomplete="off" style="text-align:center;letter-spacing:.25em">
        </div>
      </div>
      <!-- spectrum -->
      <div id="in-spec" class="hide">
        <div class="chrow"><span class="chdot" style="background:var(--ch-r)"></span>
          <button class="keybtn" id="k-r" disabled aria-label="ключ R"></button>
          <input type="text" id="s-r" class="inp" maxlength="300" placeholder="червоний канал…" autocomplete="off" spellcheck="false"></div>
        <div class="chrow"><span class="chdot" style="background:var(--ch-g)"></span>
          <button class="keybtn" id="k-g" disabled aria-label="ключ G"></button>
          <input type="text" id="s-g" class="inp" maxlength="300" placeholder="зелений канал…" autocomplete="off" spellcheck="false"></div>
        <div class="chrow"><span class="chdot" style="background:var(--ch-b)"></span>
          <button class="keybtn" id="k-b" disabled aria-label="ключ B"></button>
          <input type="text" id="s-b" class="inp" maxlength="300" placeholder="синій канал…" autocomplete="off" spellcheck="false"></div>
      </div>
      <div class="rt" id="rt"></div>
    </div>

    <!-- ХОЛСТ: завжди на місці -->
    <div class="stage" id="stage">
      <canvas id="cv" width="512" height="512"></canvas>
      <video id="vid" playsinline class="hide"></video>
      <div class="corner c-tl"></div><div class="corner c-tr"></div>
      <div class="corner c-bl"></div><div class="corner c-br"></div>
      <div class="laser hide" id="laser"></div>
      <div class="overlay hide" id="ovl">
        <p class="desc" id="ovl-text"></p>
        <div style="display:flex;gap:9px"><button class="b" id="ovl-a"></button><button class="b" id="ovl-b"></button></div>
      </div>
    </div>

    <!-- ГОЛОВНА КНОПКА -->
    <div class="action">
      <div class="menu hide" id="menu"></div>
      <button class="mainbtn" id="mainbtn"></button>
    </div>
  </main>

  <!-- ПРАВОРУЧ -->
  <aside class="side right">
    <div class="grp" id="look-grp">
      <div class="sec-t">Вигляд</div>
      <div class="row" style="display:flex;gap:7px">
        <button class="b" id="posneg" style="flex:1">◐ Нег/Поз</button>
        <button class="b" id="framebtn" style="flex:1">▢ Рамка</button>
      </div>
      <div class="seg" id="shape">
        <button data-s="square" class="on">Квадрат</button>
        <button data-s="circle">Кружечок</button>
      </div>
      <select id="pal" aria-label="Розфарбування">
        <option value="mono" selected>Моно · 1 колір</option>
        <option value="p2gold">2 · золото+циан</option>
        <option value="p2fire">2 · вогонь+лід</option>
        <option value="p3">3 · веселка</option>
        <option value="p4">4 · спектр</option>
        <option value="pearth">3 · земля</option>
      </select>
    </div>
    <div class="grp">
      <div class="sec-t">Символи</div>
      <div class="emoji" id="emoji"></div>
    </div>
    <div class="grp">
      <div class="sec-t">Підказка</div>
      <p class="desc" id="tip"></p>
    </div>
  </aside>

</div>

<input type="file" id="file" accept="image/*" hidden>
<div class="flash" id="flash"></div>

<script>
/* =====================================================================
   TAINA STUDIO — спільне ядро для трьох генераторів
   ===================================================================== */
const $=id=>document.getElementById(id);
const enc=new TextEncoder();
const decFatal=new TextDecoder('utf-8',{fatal:true});

/* ---------- стан ---------- */
let GEN='byte';                 // byte | seal | spec
let scanning=false, stream=null, rafId=null;
let hasImage=false;             // чи є що зберігати
let menuOpen=false;

/* ---------- холст ---------- */
const CV=$('cv'), CTX=CV.getContext('2d',{willReadFrequently:true});
const OFF=document.createElement('canvas'), OCTX=OFF.getContext('2d',{willReadFrequently:true});
function blit(){
  CTX.imageSmoothingEnabled=false;
  CTX.fillStyle='#0a0806';CTX.fillRect(0,0,CV.width,CV.height);
  if(!OFF.width)return;
  const s=Math.min(CV.width/OFF.width,CV.height/OFF.height);
  const w=OFF.width*s,h=OFF.height*s;
  CTX.drawImage(OFF,0,0,OFF.width,OFF.height,(CV.width-w)/2,(CV.height-h)/2,w,h);
}
function clearStage(){OFF.width=OFF.height=0;hasImage=false;blit();syncMain();}

/* ---------- звук/спалах ---------- */
function beep(f=880,d=.15){try{const A=window.AudioContext||window.webkitAudioContext;if(!A)return;
  const c=new A(),o=c.createOscillator(),g=c.createGain();o.connect(g);g.connect(c.destination);
  o.frequency.value=f;o.type='sine';g.gain.setValueAtTime(.1,c.currentTime);
  g.gain.exponentialRampToValueAtTime(.00001,c.currentTime+d);o.start();o.stop(c.currentTime+d);}catch(e){}}
function okSound(){beep(880,.1);setTimeout(()=>beep(1200,.18),100)}
function failSound(){beep(220,.35);setTimeout(()=>beep(180,.35),140)}
function flash(){const f=$('flash');f.style.opacity='.75';setTimeout(()=>f.style.opacity='0',260)}

/* ---------- КРИПТО (AES-GCM + PBKDF2) ---------- */
const PBKDF2_ITER=390000;
async function deriveKey(pass,salt,use){
  const km=await crypto.subtle.importKey('raw',enc.encode(pass),'PBKDF2',false,['deriveKey']);
  return crypto.subtle.deriveKey({name:'PBKDF2',salt,iterations:PBKDF2_ITER,hash:'SHA-256'},km,
    {name:'AES-GCM',length:256},false,[use]);}
async function encryptText(txt,pass){
  const salt=crypto.getRandomValues(new Uint8Array(16));
  const iv=crypto.getRandomValues(new Uint8Array(12));
  const key=await deriveKey(pass,salt,'encrypt');
  const ct=new Uint8Array(await crypto.subtle.encrypt({name:'AES-GCM',iv},key,enc.encode(txt)));
  const all=new Uint8Array(28+ct.length);all.set(salt,0);all.set(iv,16);all.set(ct,28);
  let bin='';for(const b of all)bin+=String.fromCharCode(b);
  return btoa(bin);}
async function decryptText(b64,pass){
  try{
    const bs=atob(b64),all=new Uint8Array(bs.length);
    for(let i=0;i<bs.length;i++)all[i]=bs.charCodeAt(i);

    const pt=await crypto.subtle.decrypt({name:'AES-GCM',iv:all.slice(16,28)},key,all.slice(28));

/* =====================================================================
   ГЕНЕРАТОР 1 — БАЙТКОД (октант з бітів UTF-8)
   ===================================================================== */
const END=0xFF, MAXLEN=400, MAXN=145;
const CH=['r','g','b'];
let bMode='oct', bLayers=1, bN=25, bGrid={r:null,g:null,b:null}, bBodyR=0;

function Rof(n){return (n-1)/2}
function capacity(m,n){const R=Rof(n);
  if(m==='oct')return (R+1)*(R+2)/2;
  if(m==='quad')return (R+1)*(R+1);
  return (R+1)*n;}
function baseCells(m,n){const c=Rof(n),R=c,out=[];
  if(m==='oct'){for(let i=0;i<=R;i++)for(let j=0;j<=i;j++)out.push([c+i,c+j]);}
  else if(m==='quad'){for(let i=0;i<=R;i++)for(let j=0;j<=R;j++)out.push([c+i,c+j]);}
  else{for(let y=0;y<n;y++)for(let i=0;i<=R;i++)out.push([c+i,y]);}
  return out;}
function mirror(m,n,x,y,g){const c=Rof(n),i=x-c,j=y-c;let p;
  if(m==='oct')p=[[i,j],[j,i],[-i,j],[-j,i],[i,-j],[j,-i],[-i,-j],[-j,-i]];
  else if(m==='quad')p=[[i,j],[-i,j],[i,-j],[-i,-j]];
  else p=[[i,j],[-i,j]];
  for(const [a,b] of p){const X=c+a,Y=c+b;if(X>=0&&Y>=0&&X<n&&Y<n)g[Y*n+X]=1;}}
function pickN(m,need){for(let n=25;n<=MAXN;n+=2)if(capacity(m,n)>=need)return n;return MAXN;}
function toBits(t){const body=enc.encode(t);const by=new Uint8Array(body.length+1);
  by.set(body);by[body.length]=END;
  const bits=new Uint8Array(by.length*8);
  for(let i=0;i<by.length;i++)for(let b=0;b<8;b++)bits[i*8+b]=(by[i]>>(7-b))&1;
  return {nby:body.length,bits};}
function readBase(g,n,m){const bc=baseCells(m,n),o=new Uint8Array(bc.length);
  for(let k=0;k<bc.length;k++){const [x,y]=bc[k];o[k]=g[y*n+x]?1:0;}return o;}
function isClean(t){for(const ch of t){const o=ch.codePointAt(0);
  if(o===0)return false;if(o<32&&ch!=='\n'&&ch!=='\t')return false;}return true;}
function decodeOctant(g,n,m){
  const bits=readBase(g,n,m),nb=bits.length>>3,buf=[];
  for(let i=0;i<nb;i++){let v=0;for(let b=0;b<8;b++)v=(v<<1)|bits[i*8+b];
    if(v===END){if(!buf.length||buf.length>MAXLEN)return null;
      try{const t=decFatal.decode(new Uint8Array(buf));return isClean(t)?t:null}catch(e){return null}}
    buf.push(v);}
  return null;}

const PAL={mono:null,p2gold:['#e8c890','#35d0c8'],p2fire:['#ff7a3c','#4bc4e8'],
  p3:['#e5556f','#e8c14a','#4bc4e8'],p4:['#e5556f','#e8a24a','#6dcf5a','#5a8ce0'],
  pearth:['#c98a4a','#7aa05a','#d8c07a']};
function byteColors(){
  if(neg)return {bg:'#ede3d0',ink:'#141414',fg:PAL[pal]||['#141414']};
  return {bg:'#0d0a08',ink:'#e8e0d0',fg:PAL[pal]||['#e8e0d0']};}

function byteTexts(){return bLayers===1?[$('t-single').value,'','']:[$('t-r').value,$('t-g').value,$('t-b').value];}

function buildByte(){
  const T=byteTexts();
  if(!T.some(t=>t.length)){clearStage();$('s-by').textContent=0;$('s-fld').textContent='—';
    $('s-cap').textContent=capacity(bMode,25);$('s-warn').style.display='none';$('rt').innerHTML='';return;}
  let need=0,tot=0;
  for(const t of T){if(!t)continue;const r=toBits(t);need=Math.max(need,r.bits.length);tot+=r.nby;}
  bN=pickN(bMode,need);
  let ovf=false,maxR=0;const c=Rof(bN);
  CH.forEach((k,i)=>{
    const g=new Uint8Array(bN*bN);
    if(T[i]){const {bits}=toBits(T[i]);const bc=baseCells(bMode,bN);
      if(bits.length>bc.length)ovf=true;
      for(let idx=0;idx<bits.length&&idx<bc.length;idx++)if(bits[idx]){
        const [x,y]=bc[idx];mirror(bMode,bN,x,y,g);
        const lr=Math.round(Math.hypot(x-c,y-c));if(lr>maxR)maxR=lr;}}
    bGrid[k]=g;});
  bBodyR=maxR;
  $('s-by').textContent=tot;$('s-fld').textContent=bN+'×'+bN;
  $('s-cap').textContent=capacity(bMode,bN);$('s-warn').style.display=ovf?'block':'none';
  renderByte();
  const got=CH.map(k=>decodeOctant(bGrid[k],bN,bMode));
  const ok=CH.every((k,i)=>(got[i]||'')===(T[i]||''));
  $('rt').innerHTML=ok?'<span class="g">✓ читається назад</span>':'<span class="r">розбіжність</span>';
  hasImage=true;syncMain();}

function paintByte(ctx,cell,pad,bg){
  const c=Rof(bN);
  const put=(x,y,col)=>{ctx.fillStyle=col;const px=(x+pad)*cell,py=(y+pad)*cell;
    if(shape==='circle'){ctx.beginPath();ctx.arc(px+cell/2,py+cell/2,cell/2*.92,0,6.2832);ctx.fill();}
    else ctx.fillRect(px,py,cell,cell);};
  if(bLayers===3){
    if(bg){ctx.fillStyle=frame?'#b8b2a6':'#000';ctx.fillRect(0,0,(bN+pad*2)*cell,(bN+pad*2)*cell);
      ctx.fillStyle='#000';ctx.fillRect(pad*cell,pad*cell,bN*cell,bN*cell);}
    for(let y=0;y<bN;y++)for(let x=0;x<bN;x++){const i=y*bN+x;
      const R=bGrid.r[i]?255:0,G=bGrid.g[i]?255:0,B=bGrid.b[i]?255:0;
      if(!R&&!G&&!B)continue;put(x,y,`rgb(${R},${G},${B})`);}
    return;}
  const {bg:BG,ink,fg}=byteColors();
  if(bg){ctx.fillStyle=frame?'#b8b2a6':BG;ctx.fillRect(0,0,(bN+pad*2)*cell,(bN+pad*2)*cell);
    ctx.fillStyle=BG;ctx.fillRect(pad*cell,pad*cell,bN*cell,bN*cell);}
  const R2=(bBodyR+.5)*(bBodyR+.5);
  for(let y=0;y<bN;y++)for(let x=0;x<bN;x++){
    const on=bGrid.r[y*bN+x];let col;
    if(on)col=fg.length>1?fg[Math.round(Math.hypot(x-c,y-c))%fg.length]:fg[0];
    else{const inB=((x-c)*(x-c)+(y-c)*(y-c))<=R2;if(!inB)continue;if(!neg&&pal==='mono')continue;col=ink;}
    put(x,y,col);}}

function renderByte(){
  const pad=frame?2:0,total=bN+pad*2;
  const cell=Math.max(1,Math.floor(700/total));
  OFF.width=OFF.height=total*cell;
  OCTX.imageSmoothingEnabled=false;
  paintByte(OCTX,cell,pad,true);
  blit();}

function genMask(size){
  if(size%2===0)size+=1;
  const m=Array(size).fill(null).map(()=>Array(size).fill(0));
  const cy=Math.floor(size/2),cx=cy,maxB=Math.ceil(cy/7)+1,map={};
  for(let by=0;by<maxB;by++)for(let bx=by;bx<maxB;bx++)
    map[bx+','+by]=PATTERNS[(Math.random()*PATTERNS.length)|0];
  for(let y=0;y<=cy;y++)for(let x=y;x<=cx;x++){
    let k=Math.floor(x/7)+','+Math.floor(y/7);
    if(!map[k])k=Math.floor(y/7)+','+Math.floor(x/7);
    const p=map[k];if(!p)continue;
    if(p[y%7][x%7]===1){
      m[cy+y][cx+x]=1;m[cy+x][cx+y]=1;m[cy-y][cx+x]=1;m[cy-x][cx+y]=1;
      m[cy+y][cx-x]=1;m[cy+x][cx-y]=1;m[cy-y][cx-x]=1;m[cy-x][cx-y]=1;}}
  return m;}

let sealPass='';
async function buildSeal(){
  const t=$('t-seal').value.trim();
  if(!t){clearStage();$('s-by').textContent=0;$('s-fld').textContent='—';$('rt').innerHTML='';return;}
  const p=sealPass.trim();
  const data = p ? '|'+await encryptText(t,p) : t;
  drawSeal(data);
  $('s-by').textContent=enc.encode(t).length;
  $('rt').innerHTML = p
    ? '<span class="g">🔒 зашифровано ключем</span>'
    : '<span class="g">✓ готово · без ключа</span>';
  hasImage=true;syncMain();}

function drawSeal(dataString){
  try{
    const utf8=unescape(encodeURIComponent(dataString));
    const qr=qrcode(0,'M');qr.addData(utf8);qr.make();
    const mc=qr.getModuleCount();
    const qz=2,fi=1,fo=2;
    let orn=mc+qz*2; if(orn%2===0)orn+=1;
    let total=orn+fi*2+fo*2; if(total%2===0)total+=1;
    const cell=Math.max(2,Math.floor(700/total));
    OFF.width=OFF.height=total*cell;
    const c=OCTX;c.imageSmoothingEnabled=false;
    c.fillStyle='rgb(180,160,140)';c.fillRect(0,0,OFF.width,OFF.height);
    c.fillStyle='rgb(25,20,15)';c.fillRect(fo*cell,fo*cell,OFF.width-fo*cell*2,OFF.height-fo*cell*2);
    const mR=genMask(orn),mG=genMask(orn),core=fo+fi+qz;
    for(let r=0;r<total;r++)for(let k=0;k<total;k++){
      const isO=(r<fo||r>=total-fo||k<fo||k>=total-fo);
      const isI=!isO&&(r<fo+fi||r>=total-(fo+fi)||k<fo+fi||k>=total-(fo+fi));
      if(isO||isI)continue;
      const oR=r-(fo+fi),oC=k-(fo+fi),qR=r-core,qC=k-core;
      const inC=(qR>=0&&qR<mc&&qC>=0&&qC<mc);
      const vR=(mR[oR]&&mR[oR][oC])?210:35;
      const vG=(mG[oR]&&mG[oR][oC])?210:35;
      let vB=35; if(inC)vB=qr.isDark(qR,qC)?210:35;
      c.fillStyle=`rgb(${vR},${vG},${vB})`;
      c.fillRect(k*cell,r*cell,cell,cell);}
    $('s-fld').textContent=total+'×'+total;
    blit();
  }catch(e){console.error(e)}}

   ===================================================================== */
const specPass={r:'',g:'',b:''}, specPlain={r:'',g:'',b:''};
async function specPayload(k){
  const el=$('s-'+k), btn=$('k-'+k);
  const encMode=btn.classList.contains('active')||btn.classList.contains('locked');
  const raw=encMode?specPlain[k]:el.value;
  if(!raw||!raw.trim())return '';
  if(btn.classList.contains('locked')&&specPass[k]){
    try{return 'SCI1:'+await encryptText(raw,specPass[k])}catch(e){return raw}}
  return raw;}

let specToken=0;
async function buildSpec(){
  const my=++specToken;
  const texts=await Promise.all(CH.map(specPayload));
  if(my!==specToken)return;
  if(!texts.some(t=>t.trim())){clearStage();$('s-by').textContent=0;$('s-fld').textContent='—';$('rt').innerHTML='';return;}
  let maxVer=1;
  texts.forEach(t=>{if(!t.trim())return;try{const tmp=qrcode(0,'M');
    tmp.addData(unescape(encodeURIComponent(t)));tmp.make();
    const v=Math.floor((tmp.getModuleCount()-17)/4);if(v>maxVer)maxVer=v;}catch(e){}});
  const mats=texts.map(t=>{if(!t.trim())return null;
    try{const q=qrcode(maxVer,'M');q.addData(unescape(encodeURIComponent(t)));q.make();return q}catch(e){return null}});
  const first=mats.find(m=>m);if(!first)return;
  const count=first.getModuleCount();
  const cell=Math.max(2,Math.floor(700/(count+4)));
  const S=(count+4)*cell;
  OFF.width=OFF.height=S;
  const c=OCTX;c.imageSmoothingEnabled=false;
  c.globalCompositeOperation='source-over';
  c.fillStyle='#000';c.fillRect(0,0,S,S);
  c.globalCompositeOperation='lighten';
  const off2=2*cell;
  mats.forEach((q,i)=>{if(!q)return;
    c.fillStyle=i===0?'rgb(255,0,0)':(i===1?'rgb(0,255,0)':'rgb(0,0,255)');
    for(let r=0;r<count;r++)for(let k=0;k<count;k++)
      if(q.isDark(r,k))c.fillRect(off2+k*cell,off2+r*cell,cell,cell);});
  c.globalCompositeOperation='source-over';
  $('s-by').textContent=texts.reduce((a,t)=>a+enc.encode(t).length,0);
  $('s-fld').textContent=count+'×'+count+' модулів';
  const locked=CH.filter(k=>$('k-'+k).classList.contains('locked')).length;
  $('rt').innerHTML=locked?`<span class="g">🔒 замкнено каналів: ${locked}</span>`:'<span class="g">✓ готово</span>';
  blit();hasImage=true;syncMain();}

/* =====================================================================
   СКАНЕР — спільний для всіх (октант + QR з SCI-калібруванням)
   ===================================================================== */
function bradley(img,ch){
  const w=img.width,h=img.height,d=img.data;
  const o=new Uint8ClampedArray(w*h*4),ii=new Int32Array(w*h);
  const s=Math.floor(w/8),t=15;
  for(let y=0;y<h;y++){let sum=0;
    for(let x=0;x<w;x++){sum+=d[(y*w+x)*4+ch];ii[y*w+x]=(y>0?ii[(y-1)*w+x]:0)+sum;}}
  for(let y=0;y<h;y++)for(let x=0;x<w;x++){
    const x1=Math.max(x-s,0),x2=Math.min(x+s,w-1),y1=Math.max(y-s,0),y2=Math.min(y+s,h-1);
    const cnt=(x2-x1)*(y2-y1);
    const sum=ii[y2*w+x2]-ii[y1*w+x2]-ii[y2*w+x1]+ii[y1*w+x1];
    const v=d[(y*w+x)*4+ch],r=(v*cnt<sum*(100-t)/100)?0:255,i=(y*w+x)*4;
    o[i]=o[i+1]=o[i+2]=r;o[i+3]=255;}
  return new ImageData(o,w,h);}
function sci(img,cfg){const d=img.data;
  for(let i=0;i<d.length;i+=4){
    const r=d[i],g=d[i+1],b=d[i+2];
    let t,n1,n2;
    if(cfg.ch==='R'){t=r;n1=g;n2=b}else if(cfg.ch==='G'){t=g;n1=r;n2=b}else{t=b;n1=r;n2=g}
    let v=(t-(n1*cfg.k1+n2*cfg.k2))*cfg.gain+(cfg.offset||0);
    v=Math.max(0,Math.min(255,v));d[i]=d[i+1]=d[i+2]=v;d[i+3]=255;}}
function osc(t,per,mn,mx){const c=t%per,h=per/2;const p=c<h?c/h:(per-c)/h;return mn+p*(mx-mn)}
const SCICFG={R:{k1:.10,k2:.20},G:{k1:.18,k2:.33},B:{k1:.05,k2:.13}};

function tryQR(imgData,st){
  let code=jsQR(imgData.data,imgData.width,imgData.height,{inversionAttempts:'attemptBoth'});
  if(code)return code.data;
  st.fail++;if(st.fail>30)st.active=true;
  const chans=['B','R','G'];
  const ch=chans[st.i++%3];
  if(st.active){
    st.t++;
    const cfg={...SCICFG[ch],ch,gain:osc(st.t,100,.5,3.5),offset:osc(st.t,250,-80,0)};
    const w=new ImageData(new Uint8ClampedArray(imgData.data),imgData.width,imgData.height);
    sci(w,cfg);
    const mono=bradley(w,0);
    code=jsQR(mono.data,imgData.width,imgData.height,{inversionAttempts:'attemptBoth'});
    if(code)return code.data;
  }else{
    const idx=ch==='R'?0:(ch==='G'?1:2);
    const mono=bradley(imgData,idx);
    code=jsQR(mono.data,imgData.width,imgData.height,{inversionAttempts:'attemptBoth'});
    if(code)return code.data;}
  return null;}

/* спроба прочитати байткод-октант з довільної картинки */
function tryByteFromImage(px,W,H){
  const readCh=(n,ci,inv)=>{const g=new Uint8Array(n*n),sx=W/n,sy=H/n;
    for(let y=0;y<n;y++)for(let x=0;x<n;x++){
      const p=(Math.floor((y+.5)*sy)*W+Math.floor((x+.5)*sx))*4;
      let v=(ci<0?((px[p]+px[p+1]+px[p+2])/3):px[p+ci])>127?1:0;
      if(inv)v=v?0:1;g[y*n+x]=v;}
    return g;};
  for(let n=25;n<=MAXN;n+=2){
    if(W%n!==0)continue;
    for(const m of ['oct','quad','half']){
      const res=[0,1,2].map(k=>decodeOctant(readCh(n,k,false),n,m));
      if(res.filter(x=>x!==null).length>=2)return {kind:'byte3',n,m,res};
      for(const inv of [false,true]){
        const t=decodeOctant(readCh(n,-1,inv),n,m);
        if(t!==null)return {kind:'byte1',n,m,res:[t,null,null]};}}}
  return null;}

/* ---------- сканування ---------- */
function stopScan(){
  scanning=false;
  if(rafId){cancelAnimationFrame(rafId);rafId=null}
  if(stream){stream.getTracks().forEach(t=>t.stop());stream=null}
  $('vid').srcObject=null;$('vid').classList.add('hide');
  $('laser').classList.add('hide');$('cv').classList.remove('hide');}

function showOverlay(text,aLabel,aFn,bLabel,bFn){
  $('ovl-text').textContent=text;
  const A=$('ovl-a'),B=$('ovl-b');
  A.textContent=aLabel;A.onclick=aFn;
  if(bLabel){B.textContent=bLabel;B.onclick=bFn;B.classList.remove('hide')}else B.classList.add('hide');
  $('ovl').classList.remove('hide');}
function hideOverlay(){$('ovl').classList.add('hide')}

function enterScan(){
  stopScan();hideOverlay();
  showOverlay('Обери джерело зображення','🖼 Галерея',()=>{hideOverlay();$('file').click()},
    '📷 Камера',()=>{hideOverlay();startCamera()});}

function startCamera(){
  const v=$('vid');
  navigator.mediaDevices.getUserMedia({video:{facingMode:'environment',width:{ideal:1280}}})
    .then(s=>{
      stream=s;v.srcObject=s;v.classList.remove('hide');$('cv').classList.add('hide');
      $('laser').classList.remove('hide');
      v.play().then(()=>{scanning=true;const st={fail:0,active:false,t:0,i:0};camLoop(st)});
    }).catch(()=>{showOverlay('Камера недоступна','🖼 Обрати файл',()=>{hideOverlay();$('file').click()})});}

function camLoop(st){
  if(!scanning)return;
  const v=$('vid');
  if(v.readyState===v.HAVE_ENOUGH_DATA){
    const tc=document.createElement('canvas');tc.width=tc.height=512;
    const tx=tc.getContext('2d',{willReadFrequently:true});
    const vw=v.videoWidth||512,vh=v.videoHeight||512,side=Math.min(vw,vh);
    tx.drawImage(v,(vw-side)/2,(vh-side)/2,side,side,0,0,512,512);
    const img=tx.getImageData(0,0,512,512);
    const data=tryQR(img,st);
    if(data){beep(880,.12);flash();stopScan();handleScanned(data,tc.toDataURL('image/png'));return;}}
  rafId=requestAnimationFrame(()=>camLoop(st));}

$('file').onchange=e=>{
  const f=e.target.files[0];if(!f)return;
  const url=URL.createObjectURL(f),im=new Image();
  im.onload=()=>{
    URL.revokeObjectURL(url);
    /* 1) спроба байткоду — потрібен точний розмір */
    const tc0=document.createElement('canvas');
    tc0.width=im.naturalWidth;tc0.height=im.naturalHeight;
    const tx0=tc0.getContext('2d',{willReadFrequently:true});
    tx0.imageSmoothingEnabled=false;tx0.drawImage(im,0,0);
    const px=tx0.getImageData(0,0,tc0.width,tc0.height).data;
    const bres=tryByteFromImage(px,tc0.width,tc0.height);
    if(bres){beep(880,.12);flash();applyByteResult(bres);e.target.value='';return;}
    /* 2) спроба QR (печатка / spectrum) */
    const tc=document.createElement('canvas');tc.width=tc.height=512;
    const tx=tc.getContext('2d',{willReadFrequently:true});
    const mn=Math.min(im.width,im.height);
    tx.drawImage(im,(im.width-mn)/2,(im.height-mn)/2,mn,mn,0,0,512,512);
    const img=tx.getImageData(0,0,512,512);
    const st={fail:100,active:true,t:0,i:0};
    let tries=0;
    (function loop(){
      tries++;
      const data=tryQR(img,st);
      if(data){beep(880,.12);flash();handleScanned(data,tc.toDataURL('image/png'));return;}
      if(tries<260)requestAnimationFrame(loop);
      else{failSound();$('rt').innerHTML='<span class="r">не вдалося розпізнати</span>';}
    })();
    e.target.value='';
  };
  im.onerror=()=>{URL.revokeObjectURL(url);$('rt').innerHTML='<span class="r">не вдалося відкрити файл</span>'};
  im.src=url;};

function applyByteResult(r){
  setGen('byte');
  bMode=r.m;syncSeg('sym','m',bMode);
  if(r.kind==='byte3'){setLayers(3);
    $('t-r').value=r.res[0]||'';$('t-g').value=r.res[1]||'';$('t-b').value=r.res[2]||'';}
  else{setLayers(1);$('t-single').value=r.res[0]||'';}
  buildByte();
  $('rt').innerHTML='<span class="g">✓ розшифровано байткод ('+(r.kind==='byte3'?'3 шари':'1 шар')+')</span>';}

async function handleScanned(raw,dataURL){
  hideOverlay();
  /* показуємо відскановане зображення */
  if(dataURL){const im=new Image();im.onload=()=>{OFF.width=OFF.height=512;
    OCTX.drawImage(im,0,0,512,512);blit();};im.src=dataURL;}
  const isSeal=raw.startsWith('|'), isSci=raw.startsWith('SCI1:');
  if(isSeal||isSci){
    const ct=isSeal?raw.slice(1):raw.slice(5);
    setGen('seal');
    $('t-seal').value='';
    pendingCipher=ct;
    showOverlay('Дані зашифровано. Введи ключ у полі вище.',
      '🔓 Розшифрувати',async()=>{await tryDecryptPending();},
      '✕ Закрити',()=>{hideOverlay()});
    $('p-seal-pass').value='';$('p-seal-pass').focus();
    $('rt').innerHTML='<span class="r">🔒 потрібен ключ</span>';
  }else{
    setGen('seal');
    $('t-seal').value=raw;sealPass='';$('p-seal-pass').value='';
    pendingCipher=null;
    okSound();
    $('rt').innerHTML='<span class="g">✓ прочитано</span>';
    hasImage=true;syncMain();}}

let pendingCipher=null;
async function tryDecryptPending(){
  if(!pendingCipher)return false;
  const p=$('p-seal-pass').value.trim();if(!p)return false;
  const r=await decryptText(pendingCipher,p);
  if(r===null){failSound();$('rt').innerHTML='<span class="r">невірний ключ</span>';return true}
  okSound();pendingCipher=null;
  $('t-seal').value=r;sealPass='';
  $('rt').innerHTML='<span class="g">✓ розшифровано</span>';
  hideOverlay();
  return true;}

function defaultName(){

function dl(blob,name){const a=document.createElement('a');a.href=URL.createObjectURL(blob);
  a.download=name;a.click();setTimeout(()=>URL.revokeObjectURL(a.href),1000);beep(660,.09);}

function doSave(fmt,name){
  if(fmt==='svg'&&GEN==='byte'){saveByteSVG(name);return}
  if(fmt==='read'){
    if(GEN==='byte'){saveByteReadable(name);return}
    // печатка/spectrum: чистий PNG без змін — саме він і читається
  }
  const ex=document.createElement('canvas');
  const scale=Math.max(1,Math.round(1024/Math.max(OFF.width,1)));
  ex.width=OFF.width*scale;ex.height=OFF.height*scale;
  const c=ex.getContext('2d');c.imageSmoothingEnabled=false;
  c.drawImage(OFF,0,0,OFF.width,OFF.height,0,0,ex.width,ex.height);
  ex.toBlob(b=>dl(b,name+'.png'));}

function saveByteReadable(name){
  const cell=Math.max(1,Math.floor(1024/bN));
  const ex=document.createElement('canvas');ex.width=ex.height=bN*cell;
  const c=ex.getContext('2d');c.imageSmoothingEnabled=false;
  c.fillStyle='#000';c.fillRect(0,0,ex.width,ex.height);
  if(bLayers===3){
    for(let y=0;y<bN;y++)for(let x=0;x<bN;x++){const i=y*bN+x;
      const R=bGrid.r[i]?255:0,G=bGrid.g[i]?255:0,B=bGrid.b[i]?255:0;
      if(!R&&!G&&!B)continue;c.fillStyle=`rgb(${R},${G},${B})`;c.fillRect(x*cell,y*cell,cell,cell);}
  }else{c.fillStyle='#fff';
    for(let y=0;y<bN;y++)for(let x=0;x<bN;x++)if(bGrid.r[y*bN+x])c.fillRect(x*cell,y*cell,cell,cell);}
  ex.toBlob(b=>dl(b,name+(bLayers===3?'-rgb':'-bw')+'.png'));}

function saveByteSVG(name){
  const c=Rof(bN),pad=frame?2:0,S=bN+pad*2,u=10;
  const shp=(px,py,col)=>shape==='circle'
    ?`<circle cx="${px+u/2}" cy="${py+u/2}" r="${u*.46}" fill="${col}"/>`
    :`<rect x="${px}" y="${py}" width="${u}" height="${u}" fill="${col}"/>`;
  let r=`<svg xmlns="http://www.w3.org/2000/svg" width="${S*u}" height="${S*u}" viewBox="0 0 ${S*u} ${S*u}" shape-rendering="crispEdges">`;
  if(bLayers===3){
    r+=`<rect width="100%" height="100%" fill="${frame?'#b8b2a6':'#000'}"/>`;
    if(frame)r+=`<rect x="${pad*u}" y="${pad*u}" width="${bN*u}" height="${bN*u}" fill="#000"/>`;
    for(let y=0;y<bN;y++)for(let x=0;x<bN;x++){const i=y*bN+x;
      const R=bGrid.r[i]?255:0,G=bGrid.g[i]?255:0,B=bGrid.b[i]?255:0;
      if(!R&&!G&&!B)continue;r+=shp((x+pad)*u,(y+pad)*u,`rgb(${R},${G},${B})`);}
  }else{
    const {bg,ink,fg}=byteColors();
    r+=`<rect width="100%" height="100%" fill="${frame?'#b8b2a6':bg}"/>`;
    if(frame)r+=`<rect x="${pad*u}" y="${pad*u}" width="${bN*u}" height="${bN*u}" fill="${bg}"/>`;
    const R2=(bBodyR+.5)*(bBodyR+.5);
    for(let y=0;y<bN;y++)for(let x=0;x<bN;x++){
      const on=bGrid.r[y*bN+x];let col;
      if(on)col=fg.length>1?fg[Math.round(Math.hypot(x-c,y-c))%fg.length]:fg[0];
      else{const inB=((x-c)*(x-c)+(y-c)*(y-c))<=R2;if(!inB)continue;if(!neg&&pal==='mono')continue;col=ink;}
      r+=shp((x+pad)*u,(y+pad)*u,col);}}
  r+='</svg>';
  dl(new Blob([r],{type:'image/svg+xml'}),name+'.svg');}

function lockChan(k){

function unlockChan(k){
  const el=$('s-'+k),kb=$('k-'+k);
  el.value=specPlain[k]||el.value;el.readOnly=false;el.removeAttribute('maxlength');
  el.classList.remove('masked');el.placeholder=({r:'червоний',g:'зелений',b:'синій'}[k])+' канал…';
  kb.classList.remove('active','locked');kb.innerHTML=IC_KEY;
  specPlain[k]='';specPass[k]='';buildSpec();}

/* печатка: ключ-кнопка — фокус на поле ключа + індикація */
$('seal-key').innerHTML=IC_KEY;
$('seal-key').disabled=false;
$('seal-key').onclick=()=>$('p-seal-pass').focus();
function syncSealKey(){
  const kb=$('seal-key'), has=$('p-seal-pass').value.trim().length>0;
  kb.classList.toggle('locked',has);
  kb.innerHTML=has?IC_LOCK:IC_KEY;}

/* емодзі */
const EMO=['♥','★','☀','☾','✦','♦','☘','✿','⚡','☺','✚','∞'];
EMO.forEach(s=>{const b=document.createElement('button');b.type='button';b.textContent=s;
  b.onclick=()=>{
    let el;
    if(GEN==='byte')el=bLayers===1?$('t-single'):(document.activeElement&&document.activeElement.id.startsWith('t-')?document.activeElement:$('t-r'));
    else if(GEN==='seal')el=$('t-seal');
    else el=(document.activeElement&&document.activeElement.id.startsWith('s-'))?document.activeElement:$('s-r');
    el.value=[...el.value,s].join('').slice(0,el.maxLength||300);
    el.dispatchEvent(new Event('input'));};
  $('emoji').appendChild(b);});

/* drag & drop */
document.addEventListener('dragover',e=>e.preventDefault());
document.addEventListener('drop',e=>{e.preventDefault();
  const f=e.dataTransfer.files[0];
  if(f&&f.type.startsWith('image/')){
    const dt=new DataTransfer();dt.items.add(f);$('file').files=dt.files;
    $('file').dispatchEvent(new Event('change'));}});

/* ---------- старт ---------- */
setLayers(1);
setGen('byte');
</script>
</body>
