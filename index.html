<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <title>Absolute Symmetry D8</title>
    <style>
        body { background: #000; margin: 0; display: flex; align-items: center; justify-content: center; height: 100vh; }
        canvas { border: 1px solid #333; image-rendering: pixelated; width: 600px; height: 600px; }
    </style>
</head>
<body>
    <canvas id="c" width="168" height="168"></canvas>

<script>
    const canvas = document.getElementById('c');
    const ctx = canvas.getContext('2d');
    const size = 168;
    const half = size / 2;

    const SPRITES = [
        [0,24,60,126,126,60,24,0], [127,65,93,85,93,65,127], [85,62,99,42,99,62,85],
        [42,119,34,73,34,119,42], [28,42,73,119,73,42,28], [119,85,119,0,119,85,119],
        [63,31,15,7,3,1,0], [1,3,7,15,31,63,127]
    ];

    function render() {
        const octant = Array.from({length: half}, () => new Uint8Array(half));
        
        // 1. ЗАПОЛНЕНИЕ ОКТАНТА (Строго r >= c)
        for (let r = 0; r < half; r += 7) {
            for (let c = 0; c <= r; c += 7) {
                const s = SPRITES[Math.floor(Math.random() * SPRITES.length)];
                for (let pr = 0; pr < 7; pr++) {
                    for (let pc = 0; pc < 7; pc++) {
                        if (r + pr < half && c + pc <= r + pr) {
                            if ((s[pr] >> (6 - pc)) & 1) octant[r + pr][c + pc] = 1;
                        }
                    }
                }
            }
        }

        // 2. БЕЗУПРЕЧНОЕ ОТРАЖЕНИЕ
        const img = ctx.createImageData(size, size);
        for (let y = 0; y < size; y++) {
            for (let x = 0; x < size; x++) {
                // Вычисляем дистанцию от "шва" (центра)
                // Если координата < half, зеркалим её.
                let ay = y < half ? (half - 1 - y) : (y - half);
                let ax = x < half ? (half - 1 - x) : (x - half);

                // Главная диагональ (D8)
                let py = ay > ax ? ay : ax;
                let px = ay > ax ? ax : ay;

                const val = octant[py][px] ? 255 : 0;
                const i = (y * size + x) * 4;
                img.data[i] = img.data[i+1] = img.data[i+2] = val;
                img.data[i+3] = 255;
            }
        }
        ctx.putImageData(img, 0, 0);
    }
    render();
</script>
</body>
</html>
