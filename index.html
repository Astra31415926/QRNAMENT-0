<!DOCTYPE html>
<html lang="uk">
<head>
    <!-- PWA Meta Tags -->
    <link rel="manifest" href="manifest.json">
    <link rel="apple-touch-icon" href="icon-192.png">
    <meta name="theme-color" content="#000000">
    
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>QRnament v3.1 // Spectral 7x7 Mandala</title>
    
    <!-- Libraries -->
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdn.jsdelivr.net/npm/qrcode-generator@1.4.4/qrcode.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/jsqr@1.4.0/dist/jsQR.min.js"></script>

    <style>
        body { 
            background: #000; 
            color: #fff; 
            font-family: 'Inter', system-ui, sans-serif; 
            overflow-x: hidden; 
        }
        
        /* Logo Colors */
        .c { color: #00FFFF; } .m { color: #FF00FF; } .y { color: #FFFF00; } 
        .k { color: #FF004D; } .a { color: #00FF41; } .n { color: #0088FF; }

        /* Canvas & Video */
        #canvas {
            width: 100%; 
            height: 100%; 
            object-fit: contain; 
            image-rendering: pixelated;
        }

        #video {
            position: absolute;
            inset: 0;
            width: 100%;
            height: 100%;
            object-fit: cover;
            background: #000;
            transform: scaleX(-1);
            display: none;
        }

        /* Scan FX */
        .scan-line { 
            position: absolute; 
            left: 0; right: 0; 
            height: 4px; 
            background: #00ff41; 
            box-shadow: 0 0 20px #00ff41, 0 0 40px #00ff41; 
            top: 0; 
            z-index: 20; 
            pointer-events: none;
            display: none;
        }

        @keyframes pulse {
            0% { opacity: 0.6; box-shadow: 0 0 20px #00ff41; height: 2px; }
            50% { opacity: 1; box-shadow: 0 0 40px #00ff41, 0 0 10px #fff; height: 6px; }
            100% { opacity: 0.6; box-shadow: 0 0 20px #00ff41; height: 2px; }
        }

        /* Flash Effect */
        .flash-overlay {
            position: absolute; 
            inset: 0; 
            background: white; 
            opacity: 0; 
            pointer-events: none; 
            z-index: 30;
            transition: opacity 0.1s;
        }

        /* Menu Overlay */
        .menu-overlay {
            position: fixed; 
            inset: 0; 
            background: rgba(0,0,0,0.98);
            z-index: 100; 
            transform: translateX(100%);
            transition: transform 0.4s cubic-bezier(0.16, 1, 0.3, 1);
            display: flex; 
            flex-direction: column; 
            padding: 2rem;
            overflow-y: auto;
        }
        .menu-overlay.open { transform: translateX(0); }

        /* UI Elements */
        .btn-active:active { transform: scale(0.96); }

        .neon-btn-green {
            background: rgba(0, 255, 65, 0.05);
            border: 1px solid #00ff41;
            box-shadow: 0 0 10px rgba(0, 255, 65, 0.2), inset 0 0 20px rgba(0, 255, 65, 0.05);
            text-shadow: 0 0 5px #00ff41;
            transition: all 0.2s;
        }
        .neon-btn-green:hover { box-shadow: 0 0 20px #00ff41, inset 0 0 30px rgba(0, 255, 65, 0.1); }

        .neon-text-glow {
            border: 1px solid #00ff41;
            box-shadow: 0 0 10px rgba(0, 255, 65, 0.1);
            transition: all 0.3s;
        }
        .neon-text-glow:focus {
            box-shadow: 0 0 20px rgba(0, 255, 65, 0.3), inset 0 0 10px rgba(0, 255, 65, 0.1);
            border-color: #fff;
        }

        /* Scrollbar */
        ::-webkit-scrollbar { width: 4px; }
        ::-webkit-scrollbar-track { background: #111; }
        ::-webkit-scrollbar-thumb { background: #00ff41; }
    </style>
</head>

    <script>
        // --- 1. SPRITE LIBRARY 7x7 (60 Modules) ---
        const SPRITE_LIB_7x7 = [
            [73,42,28,127,28,42,73], [127,65,93,85,93,65,127], [85,62,99,42,99,62,85],
            [42,119,34,73,34,119,42], [28,42,73,119,73,42,28], [0,62,34,42,46,32,63],
            [15,1,29,5,52,16,64], [64,96,112,120,112,96,64], [76,102,51,25,51,102,76],
            [119,69,117,0,87,81,119], [119,85,119,0,119,85,119], [119,65,93,20,93,65,119],
            [62,73,93,127,93,73,62], [42,107,8,119,8,107,42], [8,42,8,119,8,42,8],
            [28,8,65,99,65,8,28], [54,99,73,20,73,99,54], [63,31,15,7,3,1,0],
            [127,63,31,15,7,3,1], [127,31,31,7,7,1,1], [119,17,93,68,119,17,89],
            [119,21,87,80,127,17,89], [119,85,127,20,127,85,119], [87,80,87,0,117,5,117],
            [95,80,87,65,117,5,125], [30,80,87,65,117,5,60], [91,80,11,93,104,5,109],
            [42,99,8,93,8,99,42], [99,99,0,0,0,99,99], [99,99,99,99,99,99,99],
            [119,93,99,34,99,93,119], [54,85,99,8,99,85,54], [91,73,109,36,54,18,91],
            [127,8,107,34,107,8,127], [42,34,42,8,42,34,42], [56,43,9,127,72,106,14],
            [60,72,81,99,69,9,30], [12,56,33,107,66,14,24], [32,126,34,34,34,63,2],
            [100,94,51,42,102,61,19], [6,92,118,34,55,29,48], [28,62,119,99,119,62,28],
            [62,99,73,93,73,99,62], [126,67,89,85,77,97,63], [54,85,107,28,107,85,54],
            [127,119,99,73,99,119,127], [12,22,51,113,14,76,104], [107,73,8,127,8,73,107],
            [0,62,34,42,58,2,126], [85,21,117,5,125,1,127], [52,102,71,85,71,102,52],
            [8,8,42,34,54,20,93], [119,99,107,8,107,99,119], [62,34,107,8,107,34,62],
            [73,62,34,107,34,62,73], [123,123,96,107,3,111,111], [91,27,96,107,3,108,109],
            [0,63,32,62,2,126,0], [64,95,81,93,69,125,1], [51,51,102,102,76,76,25]
        ];

        // === АЛГОРИТМИ ОБРОБКИ ЗОБРАЖЕННЯ (USER PROVIDED) ===

        // Адаптивна бінаризація (метод Бредлі)
        function applyBradleyStandard(imgData, chIdx) {
            const w = imgData.width, h = imgData.height;
            const input = imgData.data;
            const output = new Uint8ClampedArray(w * h * 4);
            const intImg = new Int32Array(w * h);
            const s = Math.floor(w / 8), t = 15; // Розмір вікна та поріг

            // Інтегральне зображення
            for (let y = 0; y < h; y++) {
                let sum = 0;
                for (let x = 0; x < w; x++) {
                    sum += input[(y * w + x) * 4 + chIdx];
                    intImg[y * w + x] = (y > 0 ? intImg[(y - 1) * w + x] : 0) + sum;
                }
            }

            // Бінаризація пікселів
            for (let y = 0; y < h; y++) {
                for (let x = 0; x < w; x++) {
                    const x1 = Math.max(x - s, 0), x2 = Math.min(x + s, w - 1);
                    const y1 = Math.max(y - s, 0), y2 = Math.min(y + s, h - 1);
                    const count = (x2 - x1) * (y2 - y1);
                    const sum = intImg[y2 * w + x2] - intImg[y1 * w + x2] - intImg[y2 * w + x1] + intImg[y1 * w + x1];
                    const val = input[(y * w + x) * 4 + chIdx];
                    const res = (val * count < sum * (100 - t) / 100) ? 0 : 255;
                    const idx = (y * w + x) * 4;
                    output[idx] = output[idx+1] = output[idx+2] = res; output[idx+3] = 255;
                }
            }
            return new ImageData(output, w, h);
        }

        // SCI Model: Виділення конкретного кольорового каналу з компенсацією перешкод
        function applySCIMath(imgData, ch, cfg) {
            const d = imgData.data;
            for (let i = 0; i < d.length; i += 4) {
                let r = d[i], g = d[i+1], b = d[i+2];
                let target, n1, n2;
                
                // Вибір цільового каналу та сусідніх (only B matters here)
                if (ch === 'R') { target = r; n1 = g; n2 = b; }
                else if (ch === 'G') { target = g; n1 = r; n2 = b; }
                else { target = b; n1 = r; n2 = g; }

                // Математична формула виділення
                let res = (target - (n1 * cfg.k1 + n2 * cfg.k2)) * cfg.gain + cfg.offset;
                res = Math.max(0, Math.min(255, res));
                d[i] = res; d[i+1] = res; d[i+2] = res; d[i+3] = 255;
            }
        }

        // Допоміжна функція для осциляції параметрів у режимі Active Search
        function getOscParam(t, period, min, max) {
            const cycle = t % period;
            const half = period / 2;
            const pos = (cycle < half) ? cycle / half : (period - cycle) / half;
            return min + pos * (max - min);
        }

        // --- 2. APP MODULE ---
        const App = {
            state: { 
                lang: 'ua', 
                frozen: false, 
                isScanning: false,
                // Scanner State Integration
                standardFailCount: 0,
                activeSearch: false,
                time: 0,
                AUTO_TRIGGER_THRESHOLD: 15, // Поріг переходу в Active Search
                config: {
                    B: { k1: 0.5, k2: 0.5, gain: 1.5, offset: 0 } // Base config for Blue
                }
            },
            els: {},

            init() {
                this.els = {
                    canvas: document.getElementById('canvas'),
                    video: document.getElementById('video'),
                    input: document.getElementById('main-input'),
                    status: document.getElementById('status'),
                    scanLine: document.getElementById('scan-line'),
                    flash: document.getElementById('flash-layer'),
                    menu: document.getElementById('menu-overlay'),
                    fileInput: document.getElementById('file-input')
                };
                this.els.ctx = this.els.canvas.getContext('2d');
                
                this.els.input.addEventListener('input', () => {
                    if (this.state.frozen) this.state.frozen = false;
                    this.generate();
                });
                this.els.fileInput.addEventListener('change', (e) => this.handleFile(e));
                document.body.addEventListener('click', () => AudioEngine.init(), { once: true });
                
                this.clearCanvas();
                this.setLang('ua');
            },

            clearText() {
                this.els.input.value = "";
                this.clearCanvas();
                this.updateStatus("Cleared");
                AudioEngine.playClick();
            },

            toggleMenu() { this.els.menu.classList.toggle('open'); },

            // --- i18n Logic ---
            setLang(lang) {
                this.state.lang = lang;
                document.getElementById('btn-lang-ua').classList.toggle('bg-white', lang === 'ua');
                document.getElementById('btn-lang-ua').classList.toggle('text-black', lang === 'ua');
                document.getElementById('btn-lang-en').classList.toggle('bg-white', lang === 'en');
                document.getElementById('btn-lang-en').classList.toggle('text-black', lang === 'en');
                
                const i18n = {
                    main_placeholder: { ua: "Введіть текст...", en: "Type to generate..." },
                    btn_save: { ua: "Зберегти PNG", en: "Save PNG" },
                    btn_cam: { ua: "Сканувати камерою", en: "Cam Scan" },
                    btn_file: { ua: "З файлу", en: "File Scan" },
                    status_ready: { ua: "Готово", en: "Ready" },
                    m_usage: { ua: "📱 Як користуватися", en: "📱 How to use" },
                    m_usage_text: { ua: "Створюйте спектральні 2D-коди. Тестуйте зчитування з екрана або зображення.", en: "Create spectral 2D codes. Test decoding from screens or images." },
                    m_tech: { ua: "⚙️ Технологія", en: "⚙️ Technology" },
                    m_tech_text: { ua: "Кольорові 2D-коди розширюють класичний QR-код, розподіляючи дані по кольорових каналах.", en: "Color 2D codes expand classic QR by distributing data across channels." },
                    m_science: { ua: "📚 Наукова база", en: "📚 Science Base" }
                };

                document.querySelectorAll('[data-i18n]').forEach(el => {
                    const key = el.getAttribute('data-i18n');
                    if(i18n[key]) el.textContent = i18n[key][lang];
                });

                if (i18n.main_placeholder) this.els.input.placeholder = i18n.main_placeholder[lang];
            },

            generate() {
                const text = this.els.input.value;
                if (!text) { this.clearCanvas(); this.updateStatus("Waiting..."); return; }

                try {
                    const utf8Text = unescape(encodeURIComponent(text));
                    const qr = qrcode(0, 'M');
                    qr.addData(utf8Text);
                    qr.make();
                    
                    const moduleCount = qr.getModuleCount();
                    const quietZone = 4;
                    const totalModules = moduleCount + quietZone * 2;
                    const modSize = 1024 / totalModules;
                    
                    const gridR = this.build7x7Grid(totalModules);
                    const gridG = this.build7x7Grid(totalModules);
                    
                    const ctx = this.els.ctx;
                    ctx.globalCompositeOperation = "source-over";
                    ctx.fillStyle = "#000000";
                    ctx.fillRect(0, 0, 1024, 1024);

                    ctx.globalCompositeOperation = "screen";

                    ctx.fillStyle = "#FF0000";
                    this.drawGrid(ctx, gridR, totalModules, modSize);
                    
                    ctx.fillStyle = "#00FF00";
                    this.drawGrid(ctx, gridG, totalModules, modSize);

                    ctx.fillStyle = "#0000FF";
                    for (let r = 0; r < moduleCount; r++) {
                        for (let c = 0; c < moduleCount; c++) {
                            if (qr.isDark(r, c)) {
                                ctx.fillRect((c + quietZone) * modSize, (r + quietZone) * modSize, modSize, modSize);
                            }
                        }
                    }

                    ctx.globalCompositeOperation = "source-over";
                    this.updateStatus("Mandala Generated");
                } catch (e) {
                    console.error(e);
                    this.updateStatus("Error");
                }
            },

            build7x7Grid(size) {
                const grid = Array(size).fill(0).map(() => Array(size).fill(0));
                const center = Math.floor(size / 2);
                const octantMap = new Map(); 
                const maxBlocks = Math.ceil((size / 2 + 7) / 7); 

                for (let by = 0; by < maxBlocks; by++) {
                    for (let bx = by; bx < maxBlocks; bx++) {
                        const patternIdx = Math.floor(Math.random() * SPRITE_LIB_7x7.length);
                        const pattern = SPRITE_LIB_7x7[patternIdx];
                        const flipX = Math.random() > 0.5;
                        const flipY = Math.random() > 0.5;

                        for (let py = 0; py < 7; py++) {
                            for (let px = 0; px < 7; px++) {
                                let sX = flipX ? (6 - px) : px;
                                let sY = flipY ? (6 - py) : py;
                                
                                if ((pattern[sY] >> (6 - sX)) & 1) {
                                    let xRel = (bx * 7) + px - 3;
                                    let yRel = (by * 7) + py - 3;
                                    if (xRel >= yRel && yRel >= 0) {
                                        octantMap.set(`${xRel},${yRel}`, true);
                                    }
                                }
                            }
                        }
                    }
                }

                octantMap.forEach((val, key) => {
                    const [xStr, yStr] = key.split(',');
                    const x = parseInt(xStr);
                    const y = parseInt(yStr);
                    
                    const points = [
                        [ x,  y], [ y,  x], [-x,  y], [-y,  x],
                        [ x, -y], [ y, -x], [-x, -y], [-y, -x]
                    ];

                    points.forEach(([px, py]) => {
                        const absX = center + px;
                        const absY = center + py;
                        if (absX >= 0 && absX < size && absY >= 0 && absY < size) {
                            grid[absY][absX] = 1;
                        }
                    });
                });
                return grid;
            },

            drawGrid(ctx, grid, size, cellSize) {
                for(let r=0; r<size; r++) {
                    for(let c=0; c<size; c++) {
                        if(grid[r][c]) {
                            ctx.fillRect(c * cellSize, r * cellSize, cellSize + 0.5, cellSize + 0.5);
                        }
                    }
                }
            },

            // === SCANNER LOGIC (INTEGRATED USER FRAGMENT) ===

            startCamera() {
                if(this.state.isScanning) return;
                
                // Reset state for new scan
                this.state.isScanning = true;
                this.state.standardFailCount = 0;
                this.state.activeSearch = false;
                this.state.time = 0;
                
                this.updateStatus("Accessing Camera...");

                navigator.mediaDevices.getUserMedia({ video: { facingMode: "environment" } })
                    .then(stream => {
                        this.els.video.srcObject = stream;
                        this.els.video.style.display = 'block';
                        this.els.video.play();
                        this.updateStatus("Scanning Blue...");
                        AudioEngine.startScanAtmosphere();
                        this.processLoop(); // Start the custom loop
                    })
                    .catch(err => { alert("Camera Error: " + err.message); this.stopCamera(); });
            },

            stopCamera() {
                this.state.isScanning = false;
                AudioEngine.stopAll();
                if(this.els.video.srcObject) this.els.video.srcObject.getTracks().forEach(t => t.stop());
                this.els.video.style.display = 'none';
                this.els.scanLine.style.display = 'none';
            },

            processLoop() {
                if (!this.state.isScanning) return;

                let sourceCopy = null;
                // Get frame from video
                if (this.els.video.readyState === this.els.video.HAVE_ENOUGH_DATA) {
                    this.els.ctx.drawImage(this.els.video, 0, 0, 1024, 1024);
                    sourceCopy = this.els.ctx.getImageData(0, 0, 1024, 1024);
                }

                if (sourceCopy) {
                    // Standard -> Active Search Switch
                    if (this.state.standardFailCount > this.state.AUTO_TRIGGER_THRESHOLD) {
                        if (!this.state.activeSearch) {
                            this.state.activeSearch = true;
                            console.log("Switching to Active Search");
                            this.updateStatus("Active Search: B");
                        }
                    }

                    // We only process 'B' (Blue) channel as requested
                    const ch = 'B'; 
                    const idx = 2; // Blue channel index
                    const baseCfg = this.state.config[ch];
                    let foundInFrame = false;

                    if (this.state.activeSearch) {
                        // --- ACTIVE SEARCH MODE (SCI) ---
                        this.state.time++; 
                        
                        // Dynamic parameters for difficult cases
                        const gain = getOscParam(this.state.time, 100, 0.5, 3.5);
                        const offset = getOscParam(this.state.time, 250, -80, 0);
                        const cfg = { ...baseCfg, gain, offset };

                        let workData = new ImageData(new Uint8ClampedArray(sourceCopy.data), 1024, 1024);
                        applySCIMath(workData, ch, cfg);
                        let mono = applyBradleyStandard(workData, 0); // 0 because SCI creates grayscale
                        
                        const code = jsQR(mono.data, 1024, 1024, { inversionAttempts: "attemptBoth" });
                        
                        if (code) {
                            this.lockChannel(ch, code.data);
                            foundInFrame = true;
                        }
                        
                        // Display processed channel on screen
                        if (!foundInFrame) this.els.ctx.putImageData(workData, 0, 0);

                    } else {
                        // --- STANDARD MODE ---
                        this.state.standardFailCount++;
                        
                        // Simple binarization of specific channel
                        let mono = applyBradleyStandard(sourceCopy, idx);
                        const code = jsQR(mono.data, 1024, 1024, { inversionAttempts: "attemptBoth" });
                        
                        if (code) {
                            this.lockChannel(ch, code.data);
                            foundInFrame = true;
                            this.state.standardFailCount = 0; 
                        }
                        
                        if (!foundInFrame) this.els.ctx.putImageData(mono, 0, 0);
                    }
                }

                requestAnimationFrame(() => this.processLoop());
            },

            // Adapted lockChannel for single input
            lockChannel(ch, data) {
                // We found the Blue channel data
                this.state.frozen = true;
                
                // Feedback
                AudioEngine.playResult(true);
                this.flashScreen();
                
                // Input Data
                try { 
                    this.els.input.value = decodeURIComponent(escape(data)); 
                } catch(e) { 
                    this.els.input.value = data; 
                }
                
                this.updateStatus("Decoded Blue!");
                
                // Visuals
                this.stopCamera();
                this.performRitual({ data: data }); // Use existing ritual for visuals
            },

            flashScreen() {
                this.els.flash.style.opacity = '1';
                setTimeout(() => { this.els.flash.style.opacity = '0'; }, 150);
            },

            captureFrame(source, w, h) {
                const ctx = this.els.ctx;
                const aspect = w / h;
                let sx = 0, sy = 0, sw = w, sh = h;
                if (aspect > 1) { sw = h; sx = (w - sw) / 2; } 
                else { sh = w; sy = (h - sh) / 2; }
                ctx.drawImage(source, sx, sy, sw, sh, 0, 0, 1024, 1024);
            },

            performRitual(code) {
                // Simplified ritual for after-decoding visual feedback
                const line = this.els.scanLine;
                line.style.display = 'block';
                line.style.animation = 'pulse 1.5s infinite';
                line.style.top = '0%';
                line.style.transition = 'none';
                void line.offsetHeight;
                line.style.transition = 'top 2.5s linear';
                line.style.top = '100%';

                setTimeout(() => {
                   line.style.display = 'none';
                   line.style.animation = 'none';
                   // Freeze result on canvas with overlay
                   this.els.ctx.fillStyle = "rgba(0,0,0,0.7)";
                   this.els.ctx.fillRect(0, 0, 1024, 1024);
                }, 2500);
            },

            handleFile(e) {
                const file = e.target.files[0];
                if(!file) return;
                const reader = new FileReader();
                reader.onload = (evt) => {
                    const img = new Image();
                    img.onload = () => {
                        this.captureFrame(img, img.width, img.height);
                        // Use Standard Scan for file
                        let sourceData = this.els.ctx.getImageData(0, 0, 1024, 1024);
                        let mono = applyBradleyStandard(sourceData, 2); // Blue
                        const result = jsQR(mono.data, 1024, 1024, { inversionAttempts: "attemptBoth" });
                        
                        if (result) {
                            this.lockChannel('B', result.data);
                        } else {
                            this.updateStatus("No Data in Blue");
                            AudioEngine.playResult(false);
                        }
                    };
                    img.src = evt.target.result;
                };
                reader.readAsDataURL(file);
                e.target.value = '';
            },

            // --- UTILS ---
            clearCanvas() { this.els.ctx.fillStyle = "#000"; this.els.ctx.fillRect(0,0,1024,1024); },
            updateStatus(msg) { this.els.status.innerText = msg; },
            
            save() {
                const link = document.createElement('a');
                link.download = 'qrnament-mandala.png';
                link.href = this.els.canvas.toDataURL();
                link.click();
            }
        };

        // --- AUDIO ENGINE v4.5 ---
        const AudioEngine = {
            ctx: null, scanNodes: [], initialized: false,
            init() {
                if(this.initialized) return;
                try { this.ctx = new (window.AudioContext || window.webkitAudioContext)(); this.initialized = true; } catch(e) {}
            },
            playClick() {
                this.init(); if(!this.ctx) return;
                const now = this.ctx.currentTime;
                const osc = this.ctx.createOscillator();
                osc.type = 'sine'; osc.frequency.value = 1200;
                const gain = this.ctx.createGain();
                gain.gain.setValueAtTime(0.1, now);
                gain.gain.exponentialRampToValueAtTime(0.001, now + 0.05);
                osc.connect(gain); gain.connect(this.ctx.destination);
                osc.start(now); osc.stop(now + 0.05);
            },
            startScanAtmosphere() {
                this.init(); this.stopAll();
                const drone = this.ctx.createOscillator();
                drone.type = 'sine'; drone.frequency.value = 40;
                const droneGain = this.ctx.createGain(); droneGain.gain.value = 0.10;
                drone.connect(droneGain); droneGain.connect(this.ctx.destination); drone.start();
                this.scanNodes.push(drone);

                const beep = this.ctx.createOscillator();
                beep.type = 'sine'; beep.frequency.value = 880;
                const beepGain = this.ctx.createGain(); beepGain.gain.value = 0.02;
                beep.connect(beepGain); beepGain.connect(this.ctx.destination); beep.start();
                this.scanNodes.push(beep);

                const toggle = () => {
                    if(!this.scanNodes.includes(beep)) return;
                    const now = this.ctx.currentTime;
                    beepGain.gain.setValueAtTime(beepGain.gain.value, now);
                    beepGain.gain.linearRampToValueAtTime(beepGain.gain.value > 0.01 ? 0.001 : 0.02, now + 0.2);
                };
                this.beepInterval = setInterval(toggle, 400);
            },
            stopAll() { if(this.beepInterval) clearInterval(this.beepInterval); this.scanNodes.forEach(n => { try { n.stop(); } catch(e) {} }); this.scanNodes = []; },
            playResult(success) {
                if(!this.ctx) return;
                const now = this.ctx.currentTime;
                const osc = this.ctx.createOscillator();
                const gain = this.ctx.createGain();
                gain.gain.setValueAtTime(0.1, now);
                if(success) {
                    osc.type = 'sine';
                    osc.frequency.setValueAtTime(2500, now);
                    osc.frequency.exponentialRampToValueAtTime(1500, now + 0.3);
                    gain.gain.linearRampToValueAtTime(0, now + 0.3);
                } else {
                    osc.type = 'sawtooth';
                    osc.frequency.setValueAtTime(150, now);
                    osc.frequency.linearRampToValueAtTime(50, now + 0.5);
                    gain.gain.linearRampToValueAtTime(0, now + 0.5);
                }
                osc.connect(gain); gain.connect(this.ctx.destination);
                osc.start(now); osc.stop(now + 0.6);
            }
        };

        // Initialize App
        document.addEventListener('DOMContentLoaded', () => App.init());
    </script>
</body>
</html>
