<!DOCTYPE html>
<html lang="uk">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>QRnament — 3×3 Exact</title>
    <script src="https://cdn.jsdelivr.net/npm/qrcode-generator@1.4.4/qrcode.min.js"></script>
    <style>
        body { background:#000; color:#0f0; font-family:monospace; text-align:center; padding:20px; }
        canvas { image-rendering:pixelated; border:2px solid #0f0; box-shadow:0 0 40px #0f0; }
        textarea { width:90%; max-width:500px; background:#111; color:#0f0; border:1px solid #0f0; padding:12px; margin:15px 0; }
        button { background:#000; color:#0f0; border:2px solid #0f0; padding:12px 24px; margin:10px; cursor:pointer; font-size:16px; }
        button:hover { background:#0f0; color:#000; }
    </style>
</head>
<body>

    <h1>QRnament — Exact 3×3</h1>
    <textarea id="input" rows="3">Exact 3x3 Test</textarea><br>
    
    <button onclick="generate()">Генерувати</button>
    <button onclick="saveImage()">Зберегти PNG</button>

    <div style="margin:25px 0">
        <canvas id="canvas" width="1024" height="1024"></canvas>
    </div>

    <p id="status" style="color:#0f0">Готово</p>

    <script>
        const SIZE = 1024;

        function generate() {
            const text = document.getElementById('input').value.trim() || "Test";
            const status = document.getElementById('status');
            status.textContent = "Генерація...";

            // 1. Генеруємо QR
            const qr = qrcode(0, 'M');
            qr.addData(unescape(encodeURIComponent(text)));
            qr.make();

            const modules = qr.getModuleCount();           // наприклад 25
            const grid = modules * 3;                      // наприклад 75  ← ось ключова лінія
            const cellSize = SIZE / grid;                  // розмір одного мікро-пікселя орнаменту

            const quietZone = 4;

            // 2. Будуємо октант (1/8 сніжинки)
            const octantSize = Math.floor(modules / 2) + 1;
            const redMap   = buildOctant(octantSize, 0.62);
            const greenMap = buildOctant(octantSize, 0.58);

            fillMap(redMap,   [90, 130, 170]);
            fillMap(greenMap, [60, 95, 130, 170, 210, 245]);

            // 3. Растеризація
            const redRaster   = renderOctant(redMap,   grid, cellSize);
            const greenRaster = renderOctant(greenMap, grid, cellSize);

            // 4. Композитинг
            const imgData = ctx.createImageData(SIZE, SIZE);

            for (let i = 0; i < SIZE * SIZE; i++) {
                imgData.data[i*4]     = redRaster[i]   || 0;     // Червоний канал
                imgData.data[i*4 + 1] = greenRaster[i] || 0;     // Зелений канал — сніжинка
                imgData.data[i*4 + 2] = 0;
                imgData.data[i*4 + 3] = 255;
            }

            // 5. Накладаємо QR
            const modPx = SIZE / (modules + quietZone * 2);
            for (let r = 0; r < modules; r++) {
                for (let c = 0; c < modules; c++) {
                    if (qr.isDark(r, c)) {
                        const sx = Math.floor((c + quietZone) * modPx);
                        const sy = Math.floor((r + quietZone) * modPx);
                        for (let y = sy; y < sy + modPx; y++) {
                            for (let x = sx; x < sx + modPx; x++) {
                                if (x < SIZE && y < SIZE) {
                                    const idx = (y * SIZE + x) * 4;
                                    imgData.data[idx + 2] = 160;
                                }
                            }
                        }
                    }
                }
            }

            ctx.putImageData(imgData, 0, 0);
            status.textContent = `Готово • ${modules}×${modules} → ${grid}×${grid}`;
        }

        // ==================== Прості функції ====================

        function buildOctant(size, density) {
            const map = [];
            for (let r = 0; r < size; r++) {
                map[r] = [];
                for (let c = 0; c <= r; c++) {
                    map[r][c] = { 
                        on: Math.random() < density,
                        brightness: 0 
                    };
                }
            }
            return map;
        }

        function fillMap(map, brightnessArray) {
            for (let r = 0; r < map.length; r++) {
                for (let c = 0; c <= r; c++) {
                    if (map[r][c].on) {
                        map[r][c].brightness = brightnessArray[Math.floor(Math.random() * brightnessArray.length)];
                    }
                }
            }
        }

        function renderOctant(map, grid, cellSize) {
            const raster = new Uint8Array(SIZE * SIZE);
            const center = Math.floor(grid / 2);

            for (let y = 0; y < grid; y++) {
                for (let x = 0; x < grid; x++) {
                    // Перетворюємо в октант
                    const absX = Math.abs(x - center);
                    const absY = Math.abs(y - center);
                    const srcY = Math.max(absX, absY);
                    const srcX = Math.min(absX, absY);

                    const cell = map[srcY]?.[srcX];
                    if (!cell || !cell.on) continue;

                    const startX = Math.floor(x * cellSize);
                    const startY = Math.floor(y * cellSize);
                    const endX = Math.floor(startX + cellSize);
                    const endY = Math.floor(startY + cellSize);

                    for (let py = startY; py < endY; py++) {
                        for (let px = startX; px < endX; px++) {
                            if (px < SIZE && py < SIZE) {
                                raster[py * SIZE + px] = cell.brightness;
                            }
                        }
                    }
                }
            }
            return raster;
        }

        function saveImage() {
            const link = document.createElement('a');
            link.download = 'qrnament_3x3.png';
            link.href = document.getElementById('canvas').toDataURL();
            link.click();
        }

        // Ініціалізація
        let ctx;
        window.onload = () => {
            ctx = document.getElementById('canvas').getContext('2d');
            generate();
        };
    </script>
</body>
</html>
