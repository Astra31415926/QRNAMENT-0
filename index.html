<!DOCTYPE html>
<html lang="uk">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <link rel="manifest" href="manifest.json">
    <meta name="theme-color" content="#050505">
    <link rel="apple-touch-icon" href="icon-192.png">
    
    <title>QRnament v3.1 // Spectral 7x7 Mandala</title>
    
    <!-- Libraries -->
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdn.jsdelivr.net/npm/qrcode-generator@1.4.4/qrcode.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/jsqr@1.4.0/dist/jsQR.min.js"></script>

    <style>
        :root {
            --neon-green: #00ff41;
            --b-color: #0088FF;
            --bg-color: #000000;
        }
        
        body { 
            background: var(--bg-color); 
            color: #fff; 
            font-family: 'Inter', system-ui, sans-serif; 
            overflow-x: hidden;
            min-height: 100vh;
            touch-action: manipulation;
        }

        /* Logo Colors */
        .c { color: #00FFFF; } .m { color: #FF00FF; } .y { color: #FFFF00; } 
        .k { color: #FF004D; } .a { color: #00FF41; } .n { color: #0088FF; }

        /* Screen Management */
        .screen { display: none; flex-direction: column; min-height: 100vh; }
        .screen.active { display: flex; }

        /* Inputs */
        textarea {
            background: rgba(10, 10, 10, 0.8);
            border: 2px solid rgba(255,255,255,0.1);
            color: #fff;
            font-family: 'Inter', sans-serif;
            resize: none;
            transition: all 0.3s;
        }
        textarea:focus { 
            outline: none; 
            border-color: var(--b-color);
            background: rgba(20, 20, 20, 0.9);
        }
        
        /* Buttons */
        .btn-primary {
            position: relative;
            overflow: hidden;
            font-weight: 800;
            letter-spacing: 0.05em;
            transition: all 0.2s;
        }
        .btn-create {
            background: linear-gradient(135deg, #F97316, #EA580C);
            box-shadow: 0 4px 15px rgba(249, 115, 22, 0.3);
        }
        .btn-scan-ui {
            background: linear-gradient(135deg, #14B8A6, #0D9488);
            color: #000;
            box-shadow: 0 4px 15px rgba(20, 184, 166, 0.3);
        }
        .btn-secondary {
            background: rgba(255,255,255,0.05);
            border: 1px solid rgba(255,255,255,0.1);
        }
        .btn-secondary:active { background: rgba(255,255,255,0.1); }

        /* Viewfinder */
        .viewfinder-corners {
            position: absolute;
            inset: 0;
            pointer-events: none;
            z-index: 15;
            transition: all 0.3s;
        }
        .corner {
            position: absolute;
            width: 20px; height: 20px;
            border-color: rgba(255,255,255,0.3);
            transition: all 0.3s;
        }
        .tl { top: 0; left: 0; border-top: 3px solid; border-left: 3px solid; }
        .tr { top: 0; right: 0; border-top: 3px solid; border-right: 3px solid; }
        .bl { bottom: 0; left: 0; border-bottom: 3px solid; border-left: 3px solid; }
        .br { bottom: 0; right: 0; border-bottom: 3px solid; border-right: 3px solid; }
        
        .viewfinder-hunting .corner { 
            border-color: var(--neon-green); 
            box-shadow: 0 0 8px var(--neon-green);
            animation: pulse 1.5s infinite alternate; 
        }
        @keyframes pulse { 0% { opacity: 0.5; } 100% { opacity: 1; } }

        /* Effects */
        @keyframes flash { 0% { opacity: 0; } 20% { opacity: 0.8; } 100% { opacity: 0; } }
        .flash-anim { animation: flash 0.3s ease-out; }
    </style>
</head>
<body class="p-4 pb-6">

    <script>
        // === 1. SPRITE LIBRARY 7x7 (60 Modules) ===
        const SPRITE_LIB_7x7 = [
            [73,42,28,127,28,42,73], [127,65,93,85,93,65,127], [85,62,99,42,99,62,85],
            [42,119,34,73,34,119,42], [28,42,73,119,73,42,28], [0,62,34,42,46,32,63],
            [15,1,29,5,52,16,64], [64,96,112,120,112,96,64], [76,102,51,25,51,102,76],
            [119,69,117,0,87,81,119], [119,85,119,0,119,85,119], [119,65,93,20,93,65,119],
            [62,73,93,127,93,73,62], [42,107,8,119,8,107,42], [8,42,8,119,8,42,8],
            [28,8,65,99,65,8,28], [54,99,73,20,73,99,54], [63,31,15,7,3,1,0],
            [127,63,31,15,7,3,1], [127,31,31,7,7,1,1], [119,17,93,68,119,17,89],
            [119,21,87,80,127,17,89], [119,85,127,20,127,85,119], [87,80,87,0,117,5,117],
            [95,80,87,65,117,5,125], [30,80,87,65,117,5,60], [91,80,11,93,104,5,109],
            [42,99,8,93,8,99,42], [99,99,0,0,0,99,99], [99,99,99,99,99,99,99],
            [119,93,99,34,99,93,119], [54,85,99,8,99,85,54], [91,73,109,36,54,18,91],
            [127,8,107,34,107,8,127], [42,34,42,8,42,34,42], [56,43,9,127,72,106,14],
            [60,72,81,99,69,9,30], [12,56,33,107,66,14,24], [32,126,34,34,34,63,2],
            [100,94,51,42,102,61,19], [6,92,118,34,55,29,48], [28,62,119,99,119,62,28],
            [62,99,73,93,73,99,62], [126,67,89,85,77,97,63], [54,85,107,28,107,85,54],
            [127,119,99,73,99,119,127], [12,22,51,113,14,76,104], [107,73,8,127,8,73,107],
            [0,62,34,42,58,2,126], [85,21,117,5,125,1,127], [52,102,71,85,71,102,52],
            [8,8,42,34,54,20,93], [119,99,107,8,107,99,119], [62,34,107,8,107,34,62],
            [73,62,34,107,34,62,73], [123,123,96,107,3,111,111], [91,27,96,107,3,108,109],
            [0,63,32,62,2,126,0], [64,95,81,93,69,125,1], [51,51,102,102,76,76,25]
        ];

        // === 2. STATE & CONFIG (INTEGRATED) ===
        const state = {
            scanning: false,
            locked: { b: false },
            results: { b: null },
            
            // Hybrid Logic
            activeSearch: false,
            standardFailCount: 0,
            AUTO_TRIGGER_THRESHOLD: 45,
            time: 0,
            
            config: {
                // Blue Channel SCI Config
                B: { k1: 0.05, k2: 0.13 }
            }
        };

        // DOM References
        const els = {
            bText: document.getElementById('b-text'),
            bTextScan: document.getElementById('b-text-scan'),
            
            main: document.createElement('canvas'),
            video: document.createElement('video'),
            freeze: document.createElement('canvas'),
            ctx: null,
            fCtx: null,
            flash: document.getElementById('flash-layer'),
            viewfinder: document.createElement('div'),
            containers: {
                create: document.getElementById('container-create'),
                scan: document.getElementById('container-scan')
            }
        };

        // Initialize Canvas & Video
        els.main.width = 512; els.main.height = 512;
        els.freeze.width = 512; els.freeze.height = 512;
        els.main.className = "w-full h-full transition-all duration-500 relative z-10";
        els.video.className = "absolute inset-0 w-full h-full object-cover hidden z-10";
        els.video.setAttribute('playsinline', '');
        els.freeze.className = "absolute inset-0 w-full h-full object-cover hidden z-12";
        
        els.ctx = els.main.getContext('2d', { willReadFrequently: true });
        els.fCtx = els.freeze.getContext('2d', { willReadFrequently: true });

        // Viewfinder
        els.viewfinder.className = "viewfinder-corners hidden";
        els.viewfinder.innerHTML = `<div class="corner tl"></div><div class="corner tr"></div><div class="corner bl"></div><div class="corner br"></div>`;

        // === 3. ALGORITHMS (FROM USER PROVIDED SNIPPET) ===

        // Bradley Binarization
        function applyBradleyStandard(imgData, chIdx) {
            const w = imgData.width, h = imgData.height;
            const input = imgData.data;
            const output = new Uint8ClampedArray(w * h * 4);
            const intImg = new Int32Array(w * h);
            const s = Math.floor(w / 8), t = 15;

            for (let y = 0; y < h; y++) {
                let sum = 0;
                for (let x = 0; x < w; x++) {
                    sum += input[(y * w + x) * 4 + chIdx];
                    intImg[y * w + x] = (y > 0 ? intImg[(y - 1) * w + x] : 0) + sum;
                }
            }

            for (let y = 0; y < h; y++) {
                for (let x = 0; x < w; x++) {
                    const x1 = Math.max(x - s, 0), x2 = Math.min(x + s, w - 1);
                    const y1 = Math.max(y - s, 0), y2 = Math.min(y + s, h - 1);
                    const count = (x2 - x1) * (y2 - y1);
                    const sum = intImg[y2 * w + x2] - intImg[y1 * w + x2] - intImg[y2 * w + x1] + intImg[y1 * w + x1];
                    const val = input[(y * w + x) * 4 + chIdx];
                    const res = (val * count < sum * (100 - t) / 100) ? 0 : 255;
                    const idx = (y * w + x) * 4;
                    output[idx] = output[idx+1] = output[idx+2] = res; output[idx+3] = 255;
                }
            }
            return new ImageData(output, w, h);
        }

        // SCI Math Model
        function applySCIMath(imgData, ch, cfg) {
            const d = imgData.data;
            for (let i = 0; i < d.length; i += 4) {
                let r = d[i], g = d[i+1], b = d[i+2];
                let target, n1, n2;
                
                // We only use Blue channel logic here
                if (ch === 'B') { target = b; n1 = r; n2 = g; }
                else { target = b; n1 = r; n2 = g; }

                let res = (target - (n1 * cfg.k1 + n2 * cfg.k2)) * cfg.gain + cfg.offset;
                res = Math.max(0, Math.min(255, res));
                d[i] = res; d[i+1] = res; d[i+2] = res; d[i+3] = 255;
            }
        }

        function getOscParam(t, period, min, max) {
            const cycle = t % period;
            const half = period / 2;
            const pos = (cycle < half) ? cycle / half : (period - cycle) / half;
            return min + pos * (max - min);
        }

        // === 4. MAIN HYBRID LOOP (BLUE CHANNEL ONLY) ===
        function processLoop() {
            if (!state.scanning) return;

            let sourceCopy = null;
            
            if (els.video.classList.contains('hidden') === false && els.video.readyState === els.video.HAVE_ENOUGH_DATA) {
                els.ctx.drawImage(els.video, 0, 0, 512, 512);
                sourceCopy = els.ctx.getImageData(0, 0, 512, 512);
            } else if (els.freeze.classList.contains('hidden') === false) {
                sourceCopy = els.fCtx.getImageData(0, 0, 512, 512);
            }

            if (sourceCopy) {
                // Auto-switch to Active Search
                if (state.standardFailCount > state.AUTO_TRIGGER_THRESHOLD && !state.activeSearch) {
                    state.activeSearch = true;
                    console.log("Engaging Active Search (SCI) for Blue Channel");
                }

                // ONLY PROCESS BLUE CHANNEL
                if (!state.locked.b) {
                    const ch = 'B';
                    const idx = 2; // Blue channel index
                    const baseCfg = state.config[ch];
                    let foundInFrame = false;

                    if (state.activeSearch) {
                        state.time++; 
                        
                        // Dynamic Params
                        const gain = getOscParam(state.time, 100, 0.5, 3.5);
                        const offset = getOscParam(state.time, 250, -80, 0);
                        const cfg = { ...baseCfg, gain, offset };

                        let workData = new ImageData(new Uint8ClampedArray(sourceCopy.data), 512, 512);
                        applySCIMath(workData, ch, cfg);
                        let mono = applyBradleyStandard(workData, 0);
                        
                        const code = jsQR(mono.data, 512, 512, { inversionAttempts: "attemptBoth" });
                        
                        if (code) {
                            lockChannel(ch, code.data);
                            foundInFrame = true;
                        }
                        
                        if (!foundInFrame) els.ctx.putImageData(workData, 0, 0);

                    } else {
                        state.standardFailCount++;
                        
                        // Standard Mode
                        let mono = applyBradleyStandard(sourceCopy, idx);
                        const code = jsQR(mono.data, 512, 512, { inversionAttempts: "attemptBoth" });
                        
                        if (code) {
                            lockChannel(ch, code.data);
                            foundInFrame = true;
                            state.standardFailCount = 0; 
                        }
                        
                        if (!foundInFrame) els.ctx.putImageData(sourceCopy, 0, 0);
                    }
                }
            }

            requestAnimationFrame(processLoop);
        }

        // === 5. UI & ACTIONS ===
        function lockChannel(ch, data) {
            const key = ch.toLowerCase(); // 'b'
            if (state.locked[key]) return;
            
            state.locked[key] = true;
            state.results[key] = data;
            
            playBeep();
            flashScreen();
            
            els.viewfinder.classList.add('viewfinder-hunting');
            setTimeout(() => els.viewfinder.classList.remove('viewfinder-hunting'), 300);

            // Fill Inputs
            els.bTextScan.value = data;
            els.bTextScan.classList.add('locked', 'locked-b');
            
            els.bText.value = data;
            els.bText.classList.add('locked', 'locked-b');

            // Logic: If found, stop and go to Create screen
            if (state.locked.b) {
                stopScanning();
                switchScreen('create');
                generateMandala();
            }
        }

        function playBeep() {
            try {
                const ctx = new (window.AudioContext || window.webkitAudioContext)();
                const o = ctx.createOscillator();
                const g = ctx.createGain();
                o.connect(g); g.connect(ctx.destination);
                o.frequency.value = 880; o.type = "sine";
                g.gain.setValueAtTime(0.1, ctx.currentTime);
                g.gain.exponentialRampToValueAtTime(0.00001, ctx.currentTime + 0.15);
                o.start(); o.stop(ctx.currentTime + 0.15);
            } catch(e){}
        }

        function flashScreen() {
            els.flash.classList.add('flash-anim');
            setTimeout(() => els.flash.classList.remove('flash-anim'), 400);
        }

        function switchScreen(screenName) {
            document.querySelectorAll('.screen').forEach(s => s.classList.remove('active'));
            document.getElementById('screen-' + screenName).classList.add('active');
            
            const container = els.containers[screenName];
            if (container) {
                if (screenName === 'create') {
                    container.appendChild(els.main);
                    els.main.classList.remove('hidden');
                    els.main.style.opacity = '1';
                } else if (screenName === 'scan') {
                    container.appendChild(els.video);
                    container.appendChild(els.freeze);
                    container.appendChild(els.main);
                    container.appendChild(els.viewfinder);
                }
            }
        }

        async function startCamera() {
            // Reset state
            state.locked = {b:false};
            state.results = {b:null};
            state.activeSearch = false;
            state.standardFailCount = 0;
            
            els.bTextScan.value = "";
            els.bTextScan.classList.remove('locked', 'locked-b');
            els.bText.value = "";
            els.bText.classList.remove('locked', 'locked-b');

            els.viewfinder.classList.remove('hidden');
            els.video.classList.remove('hidden');
            els.freeze.classList.add('hidden');
            els.main.classList.add('hidden');

            try {
                const stream = await navigator.mediaDevices.getUserMedia({ video: { facingMode: "environment", width: {ideal: 1280} } });
                els.video.srcObject = stream; 
                els.video.play();

                state.scanning = true;
                requestAnimationFrame(processLoop);
            } catch(e) { alert("Camera Error: " + e); }
        }

        function handleFile(e) {
            const file = e.target.files[0]; 
            if (!file) return;
            
            state.locked = {b:false};
            state.results = {b:null};
            state.activeSearch = false;
            state.standardFailCount = 0;

            els.bTextScan.value = "";
            els.bTextScan.classList.remove('locked', 'locked-b');
            els.bText.value = "";
            els.bText.classList.remove('locked', 'locked-b');
            
            els.viewfinder.classList.remove('hidden');
            
            const reader = new FileReader();
            reader.onload = (ev) => {
                const img = new Image();
                img.onload = () => {
                    const s = 512;
                    els.freeze.width = s; els.freeze.height = s;
                    const ctx = els.fCtx;
                    
                    const min = Math.min(img.width, img.height);
                    ctx.drawImage(img, (img.width-min)/2, (img.height-min)/2, min, min, 0, 0, s, s);
                    
                    els.freeze.classList.remove('hidden');
                    els.video.classList.add('hidden');
                    els.main.classList.add('hidden');

                    state.scanning = true;
                    state.activeSearch = true; // Files usually need stronger processing
                    state.standardFailCount = 100; 
                    
                    requestAnimationFrame(processLoop);
                };
                img.src = ev.target.result;
            };
            reader.readAsDataURL(file);
        }

        function stopScanning() {
            state.scanning = false;
            if (els.video.srcObject) els.video.srcObject.getTracks().forEach(t => t.stop());
            els.viewfinder.classList.add('hidden');
            els.video.classList.add('hidden');
        }

        function hardReset() {
            stopScanning();
            
            state.locked = {b:false};
            state.results = {b:null};
            state.activeSearch = false;
            state.standardFailCount = 0;
            state.time = 0;

            els.bText.value = ""; 
            els.bText.classList.remove('locked', 'locked-b');

            els.bTextScan.value = ""; 
            els.bTextScan.classList.remove('locked', 'locked-b');
            
            els.freeze.classList.add('hidden');
            els.video.classList.add('hidden');
            
            els.ctx.fillStyle = "#000";
            els.ctx.fillRect(0,0,512,512);
            
            document.getElementById('save-btn').classList.add('hidden');
            
            switchScreen('home');
        }

        // === 6. MANDALA GENERATION LOGIC ===
        function generateMandala() {
            const text = els.bText.value;
            
            els.ctx.fillStyle = "#000"; 
            els.ctx.fillRect(0,0,512,512);

            if (!text.trim()) {
                els.main.style.opacity = 0.1;
                document.getElementById('save-btn').classList.add('hidden');
                return;
            }
            els.main.style.opacity = 1;
            els.main.classList.remove('hidden');

            try {
                const utf8Text = unescape(encodeURIComponent(text));
                const qr = qrcode(0, 'M');
                qr.addData(utf8Text);
                qr.make();
                
                const moduleCount = qr.getModuleCount();
                const quietZone = 4;
                const totalModules = moduleCount + quietZone * 2;
                const modSize = 512 / totalModules;
                
                const gridR = build7x7Grid(totalModules);
                const gridG = build7x7Grid(totalModules);
                
                els.ctx.globalCompositeOperation = "screen";

                els.ctx.fillStyle = "#FF0000";
                drawGrid(els.ctx, gridR, totalModules, modSize);
                
                els.ctx.fillStyle = "#00FF00";
                drawGrid(els.ctx, gridG, totalModules, modSize);

                els.ctx.fillStyle = "#0000FF";
                for (let r = 0; r < moduleCount; r++) {
                    for (let c = 0; c < moduleCount; c++) {
                        if (qr.isDark(r, c)) {
                            els.ctx.fillRect((c + quietZone) * modSize, (r + quietZone) * modSize, modSize, modSize);
                        }
                    }
                }

                els.ctx.globalCompositeOperation = "source-over";
                document.getElementById('save-btn').classList.remove('hidden');
                
            } catch(e) {
                console.error(e);
            }
        }

        function build7x7Grid(size) {
            const grid = Array(size).fill(0).map(() => Array(size).fill(0));
            const center = Math.floor(size / 2);
            const octantMap = new Map(); 
            const maxBlocks = Math.ceil((size / 2 + 7) / 7); 

            for (let by = 0; by < maxBlocks; by++) {
                for (let bx = by; bx < maxBlocks; bx++) {
                    const patternIdx = Math.floor(Math.random() * SPRITE_LIB_7x7.length);
                    const pattern = SPRITE_LIB_7x7[patternIdx];
                    const flipX = Math.random() > 0.5;
                    const flipY = Math.random() > 0.5;

                    for (let py = 0; py < 7; py++) {
                        for (let px = 0; px < 7; px++) {
                            let sX = flipX ? (6 - px) : px;
                            let sY = flipY ? (6 - py) : py;
                            
                            if ((pattern[sY] >> (6 - sX)) & 1) {
                                let xRel = (bx * 7) + px - 3;
                                let yRel = (by * 7) + py - 3;
                                if (xRel >= yRel && yRel >= 0) {
                                    octantMap.set(`${xRel},${yRel}`, true);
                                }
                            }
                        }
                    }
                }
            }

            octantMap.forEach((val, key) => {
                const [xStr, yStr] = key.split(',');
                const x = parseInt(xStr);
                const y = parseInt(yStr);
                
                const points = [
                    [ x,  y], [ y,  x], [-x,  y], [-y,  x],
                    [ x, -y], [ y, -x], [-x, -y], [-y, -x]
                ];

                points.forEach(([px, py]) => {
                    const absX = center + px;
                    const absY = center + py;
                    if (absX >= 0 && absX < size && absY >= 0 && absY < size) {
                        grid[absY][absX] = 1;
                    }
                });
            });
            return grid;
        }

        function drawGrid(ctx, grid, size, cellSize) {
            for(let r=0; r<size; r++) {
                for(let c=0; c<size; c++) {
                    if(grid[r][c]) {
                        ctx.fillRect(c * cellSize, r * cellSize, cellSize + 0.5, cellSize + 0.5);
                    }
                }
            }
        }

        function saveQR() { 
            const a = document.createElement('a'); 
            a.download = 'qrnament-mandala.png'; 
            a.href = els.main.toDataURL(); 
            a.click(); 
        }

        // === EVENT LISTENERS ===
        document.getElementById('file-input').addEventListener('change', handleFile);
        els.bText.addEventListener('input', generateMandala);
        
        // Init
        switchScreen('home');

    </script>
