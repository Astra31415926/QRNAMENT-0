<!DOCTYPE html>
<html lang="uk">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <meta name="theme-color" content="#000000">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <title>▣ QRGB Ultra v2.0</title>
    <meta name="description" content="Спектральні QR-коди RGB з мандала-арнаментом. Генерація, сканування, SCI/RSS.">
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdn.jsdelivr.net/npm/qrcode@1.5.3/build/qrcode.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/jsqr@1.4.0/dist/jsQR.js"></script>
    <link rel="manifest" href="data:application/manifest+json,{}">
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap');
        body { font-family: 'Inter', sans-serif; background: linear-gradient(135deg, #000 0%, #0a0a0a 50%, #1a0a1a 100%); }
        .glitch { animation: glitch 0.3s infinite; }
        @keyframes glitch { 0%,100%{transform:translate(0);} 20%{transform:translate(-2px,2px);} 40%{transform:translate(-2px,-2px);} 60%{transform:translate(2px,2px);} 80%{transform:translate(2px,-2px);} }
        .neon-glow { box-shadow: 0 0 20px rgba(0,123,255,0.5); }
        .scan-border { box-shadow: 0 0 0 3px rgba(0,255,0,0.5); animation: scan 2s infinite; }
        @keyframes scan { 0%,100%{box-shadow: 0 0 0 3px rgba(0,255,0,0.5);} 50%{box-shadow: 0 0 0 6px rgba(0,255,0,0);} }
        canvas { image-rendering: pixelated; image-rendering: -moz-crisp-edges; }
        .text-shadow { text-shadow: 0 0 10px rgba(255,255,255,0.5); }
    </style>
</head>
<body class="min-h-screen text-gray-200 overflow-x-hidden">
    <div class="container mx-auto px-4 py-8 max-w-4xl">
        <!-- Header -->
        <header class="text-center mb-12">
            <h1 class="text-5xl md:text-7xl font-bold bg-gradient-to-r from-blue-400 via-purple-400 to-pink-400 bg-clip-text text-transparent mb-4 glitch">
                ▣ QRGB Ultra
            </h1>
            <p class="text-xl md:text-2xl text-gray-400 max-w-2xl mx-auto mb-8 text-shadow">
                Спектральні QR з мандала-арнаментом. SCI/RSS нормалізація. Генерація + сканування.
            </p>
            <div class="flex flex-wrap justify-center gap-4 text-sm text-gray-500">
                <a href="https://zenodo.org/records/19301486" class="hover:text-blue-400">Zenodo SCI</a>
                <span>•</span>
                <a href="https://astra31415926.github.io" class="hover:text-purple-400">RGB Art</a>
            </div>
        </header>

        <!-- Controls -->
        <div class="bg-black/50 backdrop-blur-xl rounded-3xl p-8 mb-8 border border-white/10">
            <div class="grid grid-cols-1 md:grid-cols-3 gap-6 mb-6">
                <input type="text" id="qrData" placeholder="Введіть текст/URL для QR..." 
                       class="bg-black/50 border border-white/20 rounded-2xl p-4 text-lg placeholder-gray-500 focus:border-blue-500 focus:ring-2 focus:ring-blue-500/50 focus:outline-none" 
                       oninput="generateQR()">
                <div class="flex gap-2">
                    <label class="flex items-center gap-2 text-sm">
                        <input type="number" id="totalSize" value="177" min="21" max="501" step="2" class="w-20 p-2 bg-black/50 border border-white/20 rounded-xl" onchange="generateQR()">
                        <span>Модулі</span>
                    </label>
                    <label class="flex items-center gap-2 text-sm">
                        <input type="number" id="modulePx" value="3" min="1" max="10" class="w-20 p-2 bg-black/50 border border-white/20 rounded-xl" onchange="generateQR()">
                        <span>px</span>
                    </label>
                </div>
                <input type="text" id="seed" placeholder="Seed" class="bg-black/50 border border-white/20 rounded-2xl p-4 text-lg placeholder-gray-500">
            </div>
            <div class="grid grid-cols-1 sm:grid-cols-3 gap-4">
                <button onclick="generateQR()" class="bg-gradient-to-r from-blue-600 to-purple-600 hover:from-blue-700 hover:to-purple-700 text-white font-bold py-4 px-8 rounded-2xl neon-glow transition-all duration-300 transform hover:scale-105">Генерувати QR</button>
                <button onclick="scanCamera()" class="bg-gradient-to-r from-green-600 to-emerald-600 hover:from-green-700 hover:to-emerald-700 text-white font-bold py-4 px-8 rounded-2xl neon-glow transition-all duration-300 transform hover:scale-105">📱 Сканувати</button>
                <button onclick="downloadQR()" class="bg-gradient-to-r from-orange-600 to-red-600 hover:from-orange-700 hover:to-red-700 text-white font-bold py-4 px-8 rounded-2xl neon-glow transition-all duration-300 transform hover:scale-105">💾 Скачати</button>
            </div>
        </div>

        <!-- Canvas -->
        <div class="flex flex-col md:flex-row gap-8 justify-center">
            <div class="flex-1 max-w-md mx-auto">
                <canvas id="qrCanvas" class="w-full h-auto rounded-2xl shadow-2xl border-4 border-white/20 scan-border hidden"></canvas>
                <p id="decodedText" class="mt-4 text-lg font-mono bg-black/50 p-4 rounded-xl text-gray-300 hidden"></p>
            </div>
            <div class="flex flex-col gap-4">
                <div class="text-center">
                    <div class="grid grid-cols-3 gap-4 max-w-md mx-auto">
                        <canvas id="canvasR" width="200" height="200" class="rounded-xl border border-white/30 hover:border-blue-400 transition-all bg-black"></canvas>
                        <canvas id="canvasG" width="200" height="200" class="rounded-xl border border-white/30 hover:border-green-400 transition-all bg-black"></canvas>
                        <canvas id="canvasB" width="200" height="200" class="rounded-xl border border-white/30 hover:border-purple-400 transition-all bg-black"></canvas>
                    </div>
                    <div class="text-sm text-gray-500 mt-2">R: Blocks | G: Layered | B: Patterns</div>
                </div>
            </div>
        </div>

        <!-- Input file hidden -->
        <input type="file" id="fileInput" accept="image/*" style="display:none" onchange="scanFile(event)">
    </div>

    <script>
        // Весь код арнамента из предыдущего (generateBaseSnowflake, mirrorPattern, etc.) + QR
        // ... (вставь полный JS из прошлого ответа сюда)

        // QR Генерация (авто на ввод)
        function generateQR() {
            const data = document.getElementById('qrData').value;
            if (!data) return;
            
            const totalSize = parseInt(document.getElementById('totalSize').value);
            const modulePx = parseInt(document.getElementById('modulePx').value);
            
            // Арнаменты по каналам
            generate('R'); generate('G'); generate('B');
            
            // QR overlay на главный canvas
            const canvas = document.getElementById('qrCanvas');
            canvas.classList.remove('hidden');
            QRCode.toCanvas(canvas, data, { width: 400, margin: 0, color: { dark: '#000', light: '#FFF' } }, (err) => {
                if (err) console.error(err);
            });
        }

        // Камера + звук
        let stream;
        async function scanCamera() {
            const video = document.createElement('video');
            video.style.cssText = 'position:fixed;top:0;left:0;width:100vw;height:100vh;object-fit:cover;z-index:1000;';
            document.body.appendChild(video);
            
            stream = await navigator.mediaDevices.getUserMedia({ video: { facingMode: 'environment' } });
            video.srcObject = stream;
            video.play();
            
            // Звук затвора
            const audio = new AudioContext();
            const osc = audio.createOscillator();
            osc.connect(audio.destination);
            osc.start();
            setTimeout(() => osc.stop(), 100);
            
            // Скан каждые 500ms
            const scanInterval = setInterval(() => {
                const canvas = document.createElement('canvas');
                canvas.width = video.videoWidth;
                canvas.height = video.videoHeight;
                canvas.getContext('2d').drawImage(video, 0, 0);
                const imageData = canvas.getContext('2d').getImageData(0, 0, canvas.width, canvas.height);
                const code = jsQR(imageData.data, imageData.width, imageData.height);
                if (code) {
                    document.getElementById('decodedText').textContent = code.data;
                    document.getElementById('decodedText').classList.remove('hidden');
                    clearInterval(scanInterval);
                    stopScan(video);
                }
            }, 500);
        }

        function stopScan(video) {
            stream.getTracks().forEach(track => track.stop());
            video.remove();
        }

        function scanFile(event) {
            const file = event.target.files[0];
            const img = new Image();
            img.onload = () => {
                const canvas = document.createElement('canvas');
                canvas.width = img.width; canvas.height = img.height;
                canvas.getContext('2d').drawImage(img, 0, 0);
                const imageData = canvas.getContext('2d').getImageData(0, 0, canvas.width, canvas.height);
                const code = jsQR(imageData.data, imageData.width, imageData.height);
                if (code) document.getElementById('decodedText').textContent = code.data;
            };
            img.src = URL.createObjectURL(file);
        }

        function downloadQR() {
            const canvas = document.getElementById('qrCanvas');
            const link = document.createElement('a');
            link.download = 'qr-ultra.png';
            link.href = canvas.toDataURL();
            link.click();
        }

        // Инит
        generateAll();
    </script>
</body>
</html>
