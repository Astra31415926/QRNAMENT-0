<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <title>QR-Mandala Typing</title>
    <style>
        body { background: #000; display: flex; flex-direction: column; align-items: center; justify-content: center; height: 100vh; margin: 0; font-family: monospace; }
        canvas { border: 1px solid #333; image-rendering: pixelated; width: 600px; height: 600px; margin-top: 20px; }
        input { background: #000; border: 1px solid #0f0; color: #0f0; padding: 10px; width: 300px; text-align: center; outline: none; }
    </style>
</head>
<body>
    <input type="text" id="si" value="ABC" placeholder="ПЕЧАТАЙ ТУТ...">
    <canvas id="c" width="21" height="21"></canvas>

<script>
    const canvas = document.getElementById('c'), ctx = canvas.getContext('2d'), input = document.getElementById('si');
    const SPRITES = [[24,60,126,126,60,24,0],[127,65,93,85,93,65,127],[85,62,99,42,99,62,85],[119,85,119,0,119,85,119],[62,73,93,127,93,73,62],[99,99,0,0,0,99,99]];

    function render() {
        let h = 0; String(input.value).split('').forEach(c => h = Math.imul(31, h) + c.charCodeAt(0) | 0);
        const rnd = () => { h = Math.sin(h++) * 10000; return h - Math.floor(h); };
        
        const oct = Array.from({length: 11}, () => new Uint8Array(11));
        for (let r = 0; r < 11; r += 7) for (let c = 0; c <= r; c += 7) {
            const s = SPRITES[Math.floor(rnd() * SPRITES.length)];
            for (let pr = 0; pr < 7; pr++) for (let pc = 0; pc < 7; pc++) {
                if (r+pr < 11 && c+pc <= r+pr && (s[pr] >> (6-pc)) & 1) oct[r+pr][c+pc] = 1;
            }
        }

        const img = ctx.createImageData(21, 21);
        for (let y = 0; y < 21; y++) for (let x = 0; x < 21; x++) {
            let ay = Math.abs(y-10), ax = Math.abs(x-10);
            let py = Math.max(ay, ax), px = Math.min(ay, ax);
            const v = oct[py][px] ? 255 : 0, i = (y*21 + x)*4;
            img.data[i] = img.data[i+1] = img.data[i+2] = v; img.data[i+3] = 255;
        }
        ctx.putImageData(img, 0, 0);
    }

    input.oninput = render;
    render();
</script>
</body>
</html>
